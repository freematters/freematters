# Flow:
#
#   verify → done
#

version: 1
guide: |
  E2E test verifier workflow. Drives verification of a test plan by controlling
  an embedded Claude Code agent session.

  The test plan file path and test output directory are provided in the initial prompt.
  The agent reads the test plan, starts an embedded agent, interacts with it
  via run_agent/wait/send, judges each step, and writes a report.

  ## Available MCP Tools

  In addition to standard tools (Read, Write, Bash), you have:

  ### run_agent
  Start an embedded Claude Code agent session with a given prompt.
  Returns `{ ok: true }` on success. Only one session can be active at a time.

  ### wait
  Wait for the embedded agent to finish its current turn.
  Returns `{ output }` — the assistant text produced during that turn.
  Use timeout parameter (ms) to avoid waiting forever (default 120s).

  ### send
  Send a follow-up message to the embedded agent to start a new turn.
  Returns `{ ok: true }`. The agent will process the message on the next `wait()`.

  Rules:
  - Read the test plan file to understand what to test.
  - Execute steps exactly as described in the test plan.
  - Decide what input to provide based on the test plan's steps and goals.
  - Do NOT skip steps or invent steps not in the plan.

initial: verify

states:
  verify:
    prompt: |
      ## Verify

      1. Read the test plan file (path provided in the initial prompt).
      2. Understand the background, steps, and expected outcomes.
      3. Start the embedded agent using `run_agent` with the prompt from the
         test plan's Setup section.
      4. Execute each test step by interacting with the embedded agent:
         - Call `wait()` to receive the agent's output from its current turn.
         - Compare actual behavior against expected outcomes for each step.
         - When the plan requires sending input or instructions, use `send()`.
         - Judge each step as PASS or FAIL with evidence.
         - Continue until all steps are complete or the agent session ends.
         - Do NOT stop on failure — observe all steps even if one fails.
      5. Write a `test-report.md` file to the test output directory with:
         - Overall verdict: PASS or FAIL
         - Per-step verdicts with evidence
         - Any unexpected observations
         - Failure details with evidence for debugging
         - **Debug artifacts** section with absolute paths to key files in the
           run directory (available via `FREEFSM_RUN_DIR` env var or the run directory
           printed to stderr at startup):
           - `verifier-session.jsonl` — verifier (this agent's) full session log
           - `executor-session.jsonl` — executor agent's full session log
           - `<test-plan>.md` — copy of the test plan used for this run
           - `events.jsonl` — FSM event history
           - `snapshot.json` — final FSM state
      6. Output a final summary: overall verdict, steps passed/failed.

      If the test plan is invalid, write a FAIL report explaining the error.
    transitions:
      done: done

  done:
    prompt: |
      Verification complete.
    transitions: {}
