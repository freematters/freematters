version: 1
guide: |
  General release workflow for GitHub projects.
  Opens a release PR, merges after CI, tags and publishes.

  ## GitHub CLI

  Read `{workflow_dir}/../references/github-cli.md` for CLI conventions and auth.

  ## Configuration (set these before starting)

  The workflow prompts reference these variables. Before entering the `bump` state,
  determine them from the project context:

  - **PKG_DIR**: package directory relative to repo root (e.g. `freefsm`, `.` for root)
  - **TAG_PREFIX**: tag prefix for releases (e.g. `freefsm-v`, `v`)
  - **VERSION_CMD**: command to bump version (e.g. `npm version <bump> --no-git-tag-version`)
  - **VERSION_READ_CMD**: command to read current version (e.g. `node -p "require('./package.json').version"`)
  - **FORMAT_CMD**: optional post-bump formatting command (e.g. `npx biome check --write .`)
  - **RELEASE_NOTES_TEMPLATE**: path to release notes template (optional)
  - **RELEASE_WORKFLOW**: GitHub Actions workflow filename for publish (e.g. `release.yml`, optional)
  - **COMMIT_SCOPE**: path filter for `git log` (e.g. `freefsm/`, `.`)

initial: bump
states:
  bump:
    prompt: |
      # Phase: Version Bump

      ## 1. Check preconditions
      - Working tree must be clean; must be on `main`. Pull latest with `--ff-only`.

      ## 2. Determine bump type
      Find the last release tag (`${TAG_PREFIX}*`), get commits since that tag
      (scoped to `${COMMIT_SCOPE}`), and classify:
      - **major**: `BREAKING CHANGE` or `!:` suffix
      - **minor**: `feat:` commits
      - **patch**: everything else

      Present commit list, recommended bump, and ask user to confirm.

      ## 3. Generate release notes
      If RELEASE_NOTES_TEMPLATE is configured, read and fill placeholders
      (`{{VERSION}}`, `{{ONE_LINE_SUMMARY}}`, `{{NARRATIVE}}`, `{{Breaking Changes}}`,
      `{{Features/Fixes/Other}}`, `{{OWNER}}/{{REPO}}`, `{{PREV_TAG}}`).
      Write to `WF_DIR/RELEASE_NOTES.md` (NOT the repo). Show draft and ask for approval.

      ## 4. Create release branch and bump
      Run `${VERSION_CMD}` in `${PKG_DIR}`, optionally `${FORMAT_CMD}`, then:
      ```bash
      git checkout -b release/${TAG_PREFIX}${VERSION}
      git add ${PKG_DIR}
      git commit -m "release: ${TAG_PREFIX}${VERSION}"
      git push -u origin release/${TAG_PREFIX}${VERSION}
      ```

      ## 5. Open PR
      Create PR titled `release: ${TAG_PREFIX}${VERSION}` with release notes as body.
    transitions:
      pr opened: ci

  ci:
    prompt: |
      # Phase: Wait for CI

      Watch PR checks until all pass, then merge (squash, delete branch).
      - Lint/format failures: auto-fix with `${FORMAT_CMD}` if configured, commit, push, re-poll.
      - Other failures: show logs and ask user how to proceed.

      After merge, checkout main and pull.
    transitions:
      merged: tag

  tag:
    prompt: |
      # Phase: Tag and Push

      Read VERSION via `${VERSION_READ_CMD}` in `${PKG_DIR}`, then tag and push:
      ```bash
      git tag "${TAG_PREFIX}${VERSION}"
      git push origin "${TAG_PREFIX}${VERSION}"
      ```

    transitions:
      tag pushed: monitor

  monitor:
    prompt: |
      # Phase: Monitor Release

      If RELEASE_WORKFLOW is configured, watch the workflow run until completion.

      - **Success** (or no workflow configured): create/update the GitHub release
        with the generated notes, show the release URL.
      - **Failure**: show failed job logs.
    transitions:
      release succeeded: done
      release failed: done

  done:
    prompt: "Release complete."
    transitions: {}
