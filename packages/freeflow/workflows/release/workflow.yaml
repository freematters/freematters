version: 1
guide: |
  General release workflow for GitHub projects.
  Opens a release PR, merges after CI, tags and publishes.

  ## GitHub CLI

  Read `$SCRIPT_DIR/../references/github-cli.md` for CLI conventions and auth.

  ## Configuration (set these before starting)

  The workflow prompts reference these variables. Before entering the `bump` state,
  determine them from the project context:

  - **PKG_DIR**: package directory relative to repo root (e.g. `freefsm`, `.` for root)
  - **TAG_PREFIX**: tag prefix for releases (e.g. `freefsm-v`, `v`)
  - **VERSION_CMD**: command to bump version (e.g. `npm version <bump> --no-git-tag-version`)
  - **VERSION_READ_CMD**: command to read current version (e.g. `node -p "require('./package.json').version"`)
  - **FORMAT_CMD**: optional post-bump formatting command (e.g. `npx biome check --write .`)
  - **RELEASE_NOTES_TEMPLATE**: path to release notes template (optional)
  - **RELEASE_WORKFLOW**: GitHub Actions workflow filename for publish (e.g. `release.yml`, optional)
  - **COMMIT_SCOPE**: path filter for `git log` (e.g. `freefsm/`, `.`)

initial: bump
states:
  bump:
    prompt: |
      # Phase: Version Bump

      ## 1. Check preconditions

      ```bash
      git status --porcelain
      git branch --show-current
      ```

      - Working tree must be clean. If dirty, stop and ask the user to commit or stash.
      - Must be on `main` (or the project's default branch). If not, stop and warn.
      - Pull latest: `git pull --ff-only`

      ## 2. Determine bump type

      Find the last release tag:
      ```bash
      git tag --list '${TAG_PREFIX}*' --sort=-version:refname | head -1
      ```

      If no tag exists, use the full commit history. Otherwise, get commits since that tag:
      ```bash
      git log <last_tag>..HEAD -- ${COMMIT_SCOPE}
      ```

      Analyze the commit messages and determine the bump type:
      - **major**: any commit with `BREAKING CHANGE` or `!:` (e.g. `feat!:`)
      - **minor**: any `feat:` or `feat(...):`
      - **patch**: everything else (`fix:`, `perf:`, `chore:`, non-conventional commits)

      Use the highest applicable level. Present your analysis to the user:
      - Show the commit list
      - Show your recommended bump type and reasoning
      - Ask the user to confirm or override

      ## 3. Generate release notes

      If a RELEASE_NOTES_TEMPLATE is configured, read the template and fill in placeholders:

      - `{{VERSION}}`: the new version (from step 4 below)
      - `{{ONE_LINE_SUMMARY}}`: a single-sentence summary of the release theme
      - `{{NARRATIVE}}`: 2-3 sentences on what changed and why it matters
      - `{{Breaking Changes}}`: list or omit section entirely if none
      - `{{Features/Fixes/Other}}`: categorize commits by conventional commit prefix
      - `{{OWNER}}/{{REPO}}`: GitHub owner/repo (from `gh repo view --json owner,name`)
      - `{{PREV_TAG}}`: the previous release tag

      Write the filled-in notes to `WF_DIR/RELEASE_NOTES.md` (the workflow run directory,
      NOT the repo). Do not commit this file. Show the draft to the user and ask if they
      want to adjust anything before proceeding.

      If no template is configured, generate release notes in a standard format with
      the same sections.

      ## 4. Create release branch and bump

      ```bash
      cd ${PKG_DIR}
      ${VERSION_CMD}
      ${FORMAT_CMD}  # skip if not configured
      VERSION=$(${VERSION_READ_CMD})
      cd <repo_root>
      git checkout -b release/${TAG_PREFIX}${VERSION}
      git add ${PKG_DIR}
      git commit -m "release: ${TAG_PREFIX}${VERSION}"
      git push -u origin release/${TAG_PREFIX}${VERSION}
      ```

      ## 5. Open PR

      Create a PR with title `release: ${TAG_PREFIX}${VERSION}` using the release notes
      as the body. Record the PR number and VERSION for the next state.
    transitions:
      pr opened: ci

  ci:
    prompt: |
      # Phase: Wait for CI

      Watch the PR checks until all pass.

      - If all checks pass, merge the PR (squash, delete branch).
      - If a **lint** or **format** check fails and FORMAT_CMD is configured, auto-fix locally
        (`${FORMAT_CMD}`), commit, push, then re-poll.
      - If any other check fails, show the failure and stop — ask the user how to proceed.

      After merge, checkout main and pull.
    transitions:
      merged: tag

  tag:
    prompt: |
      # Phase: Tag and Push

      Read the version (source of truth):

      ```bash
      cd ${PKG_DIR}
      VERSION=$(${VERSION_READ_CMD})
      cd <repo_root>
      git tag "${TAG_PREFIX}${VERSION}"
      git push origin "${TAG_PREFIX}${VERSION}"
      ```

    transitions:
      tag pushed: monitor

  monitor:
    prompt: |
      # Phase: Monitor Release

      ## 1. Find the release workflow run

      If RELEASE_WORKFLOW is configured, find the latest run for the workflow.
      If no release workflow is configured, skip to step 3 (verify).

      ## 2. Watch until completion

      Watch the workflow run until it completes.

      ## 3. Verify

      Once the run completes (or if no workflow):

      - If **success** (or no workflow): create or update the GitHub release with the
        generated notes file, then show the release URL.
      - If **failure**: show the failed job logs.
    transitions:
      release succeeded: done
      release failed: done

  done:
    prompt: "Release complete."
    transitions: {}
