# GitHub Spec-Gen Lite — Simplified GitHub Issue-driven spec-gen workflow
#
# Lite variant of github-spec-gen that produces simplified design and plan
# artifacts while keeping all other workflow phases unchanged.
#
# Key differences from github-spec-gen:
#   - design.md: 4 sections (Overview, Goal & Constraints, Architecture & Components, E2E Testing)
#   - plan.md: exactly 2 steps (Implement the feature + E2E test)
#
# Flow:
#
#   create-issue
#       |           \
#   requirements <-- > research
#       |
#     design <-- > requirements (gaps)
#       |
#      plan <-- > design (revision)
#       |
#     e2e-gen
#       |
#     done
#
#   Fast forward: requirements -> design -> plan -> e2e-gen -> done (no intermediate approvals)

version: 1.1
extends_guide: ../github-spec-gen/workflow.yaml
guide: |
  {{base}}

initial: create-issue

states:
  create-issue:
    prompt: |
      ## Create Issue

      Before anything else, verify GitHub CLI authentication:
      ```bash
      gh auth status
      ```
      If this fails, tell the user to run `gh auth login` and stop.

      Parse the user's prompt to extract:
      1. **Repository**: The `owner/repo` string (e.g., `freematters/testbed`). The user provides this in their prompt — there is no `--repo` flag.
      2. **Idea**: The description of what they want to build.
      3. **Title**: Generate a concise issue title from the idea.

      Then create a GitHub issue (if this fails with 404/403, report the error and ask the user to check the repo name and permissions):

      ```bash
      gh issue create --repo {repo} --title "{title}" --body "{body}"
      ```

      The issue body MUST follow this exact structure:

      ```markdown
      ## {title}

      {rough idea from user prompt}

      ## Status

      - [ ] gathering requirements
      - [ ] research
      - [ ] design
      - [ ] plan

      - [ ] spec-ready
      ```

      From the `gh issue create` output, extract and remember:
      - The **issue number** (from the URL in the output, e.g., `https://github.com/owner/repo/issues/42` -> issue number is `42`)
      - The **issue creator** username (run `gh api user --jq .login` to get the authenticated user's login, since the bot is creating the issue on behalf of the user)

      Report the issue URL to the user.

      Then post an initial welcome comment on the issue:

      ```bash
      gh issue comment {n} --repo {repo} --body "[bot reply] Welcome! I'll guide you through a spec generation process on this issue.

      Where would you like to start?

      1. **Requirements clarification** (recommended) -- refine the idea through Q&A
      2. **Research first** -- investigate specific technical topics before refining requirements

      Reply with your choice (1 or 2)."
      ```

      Now poll for the user's reply using the polling pattern from the guide.
      When you receive a reply from the issue creator:
      - If they choose requirements (1), transition to `start with requirements`
      - If they choose research (2), transition to `start with research`

      You MUST NOT proceed without the user's explicit choice via an issue comment.
    transitions:
      start with requirements: requirements
      start with research: research

  requirements:
    from: "../spec-gen/workflow.yaml#requirements"
    prompt: |
      {{base}}

      ### GitHub Adaptation

      All interaction happens via issue comments.
      Read the issue body first to understand the rough idea (instead of rough-idea.md).
      Post each question as an issue comment. Poll for replies using the polling pattern.

      You MUST ask ONE question at a time. Post a single question as an issue comment,
      poll for the reply, record the Q&A pair, then ask the next question.
      Do NOT batch multiple questions into one comment.

      When compiling requirements:
      1. Post the structured requirements as a `## requirements.md` artifact comment.
      2. Update the issue body status checklist: check off "gathering requirements".
      3. Post transition options as an issue comment:
         - "Revise requirements"
         - "Research first"
         - "Proceed to design"
         - "Fast forward" (skip to design, no intermediate approvals)
      4. Poll for the user's choice via comment reply.

  research:
    from: "../spec-gen/workflow.yaml#research"
    prompt: |
      {{base}}

      ### GitHub Adaptation

      All interaction and output happens via issue comments — do NOT write local files.
      Post research findings as `## research/<topic-name>.md` artifact comments,
      following the Research Structure from the guide.

      After completing research:
      1. Update the issue body status checklist: check off "research".
      2. Post transition options as an issue comment:
         - "Back to requirements"
         - "Proceed to design"
      3. Poll for the user's choice via comment reply.

  design:
    from: "../spec-gen/workflow.yaml#design"
    prompt: |
      ## Detailed Design (Lite)

      Produce a standalone, comprehensive design.md artifact.
      "Standalone" means it MUST be fully understandable on its own without other artifacts.

      **This is the lite variant.** Skip the "Design approaches" step — proceed directly
      to the full design.

      Required sections (exactly 4):
      1. **Overview** — one-paragraph summary of what we're building and why
      2. **Goal & Constraints** — derived from requirements and codebase exploration.
         Goal: list of feature requirements (what the implementation must deliver).
         Constraints: list of MUST NOTs (boundaries the implementation must not violate).
      3. **Architecture & Components** — merged section covering:
         - High-level architecture with a Mermaid diagram
         - Component responsibilities, API surface, and how components interact
         - Key data structures, schemas, state, and their relationships
         - Integration test cases verifying module boundaries. Format each test case as:
           - **Given**: preconditions and setup
           - **When**: the action or interaction under test
           - **Then**: expected outcome
      4. **E2E Testing** — describe key end-to-end scenarios as user journeys. Read
         `@packages/freeflow/docs/e2e-testing-design.md` for the verifier-executor model.
         Format each as a named scenario with numbered steps mixing user actions,
         system responses, and verification points:
         ```
         **Scenario: <name>**
         1. User does X
         2. System shows Y
         3. User does Z
         4. **Verify:** expected side effect
         ```
         **CRITICAL**: If e2e testing was required in requirements, every command, process,
         or API referenced in the e2e scenarios MUST be covered by a component in the design.

      Do NOT include an "Error Handling" section — keep to exactly 4 sections.

      Constraints:
      - You MUST derive Goal & Constraints from requirements and codebase exploration.
        The design document replaces requirements as the authoritative spec.
      - You MUST include Mermaid diagrams for architecture and data flow.
      - You MUST iterate on feedback until the user explicitly approves the complete design.

      Troubleshooting:
      - If design reveals complexity beyond the original scope, break into smaller components,
        focus on core functionality first, and suggest phased implementation.
        Return to requirements to re-scope if needed.

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT wait for user
      approval. Complete the design document, then immediately transition to plan.

      **Normal mode**: You MUST NOT proceed to planning until the user explicitly approves the design.
      If significant gaps are found, offer to return to requirements or research.

      ### GitHub Adaptation

      Skip the "Design approaches" step (Step 1) — proceed directly to the full design.

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT poll
      for approval. Complete the design, post it as an artifact comment, update the status
      checklist, and immediately transition to plan.

      Before writing, read requirements and research from the local artifact cache:
      ```bash
      ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
      ```
      Use the Read tool on `$ARTIFACTS/requirements.md` and any files in `$ARTIFACTS/research/`.

      Write the design to the local cache and post it per the artifact creation guide.
      Ask for feedback via comment (approve / request changes / requirements gaps). Poll for reply.
      Use in-place edit for revisions per the guide.

      On approval, update the issue body status checklist: check off "design".
    todos:
      - Post design as issue comment (skip design approaches step)
      - Get user approval via issue comment (skip in fast-forward mode)
    transitions:
      design approved: plan
      gaps found: requirements

  plan:
    from: "../spec-gen/workflow.yaml#plan"
    prompt: |
      ## Implementation Plan (Lite)

      Produce a plan.md artifact — a simplified 2-step implementation plan.

      **This is the lite variant.** Instead of N steps (one per component), produce
      exactly 2 steps: "Implement the feature" and "E2E test".

      Required format:
      ```markdown
      # Implementation Plan: <Feature Name>

      ## Checklist
      - [ ] Step 1: Implement the feature
      - [ ] Step 2: E2E test

      ---

      ## Step 1: Implement the feature

      **Depends on**: none

      **Objective**: Implement all components described in design.md.

      **Sub-items**:
      - <bullet referencing design component 1>
      - <bullet referencing design component 2>
      - ...

      **Related Files**: <all files from design>

      **Test Requirements**: <integration tests from design>

      ---

      ## Step 2: E2E test

      **Depends on**: Step 1

      **Objective**: Run e2e tests to validate the implementation.
      ```

      Step 1 sub-items MUST reference the specific components from design.md's
      Architecture & Components section. Each bullet should describe what to implement
      for that component.

      E2E testing is handled by the e2e-gen state after plan approval — but Step 2
      in the plan ensures spec-to-code will run e2e tests during implementation.

      **CRITICAL: E2E completeness check.** If design.md has an E2E Testing section,
      verify that EVERY command, server process, or setup step referenced in the e2e
      scenarios has a corresponding sub-item in Step 1.

      Constraints:
      - Exactly 2 steps. Do NOT add more steps.
      - You MUST NOT duplicate design details — reference design.md sections instead.
      - You MUST present the plan to the user and iterate on feedback until approved.

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT wait for user
      approval. Complete the plan, then immediately transition to e2e-gen.

      **Normal mode**: You MUST NOT proceed until the user explicitly approves the implementation plan.

      ### GitHub Adaptation

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT poll
      for approval. Complete the plan, post it as an artifact comment, update the status
      checklist and plan task list in the issue body, and immediately transition to e2e-gen.

      Read the design from the local artifact cache:
      ```bash
      ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
      ```
      Use the Read tool on `$ARTIFACTS/design.md`.

      Write the plan to the local cache and post it per the artifact creation guide.
      Also update the issue body to add the plan steps as a `## Plan` task checklist.
      Update the issue body status checklist: check off "plan".

      Ask for feedback via comment (approve / request changes / design revision). Poll for reply.
      Use in-place edit for revisions per the guide. Also update the issue body plan
      checklist when revising.
    todos:
      - Post plan as issue comment with plan checklist in issue body
      - Get user approval via issue comment (skip in fast-forward mode)
    transitions:
      plan approved: e2e-gen
      needs design revision: design

  e2e-gen:
    from: "../spec-gen/workflow.yaml#e2e-gen"
    prompt: |
      {{base}}

      ### GitHub Adaptation

      Read `$HOME/.freeflow/runs/{run_id}/artifacts/design.md` for the design artifact.
      If generating e2e.md, write it to the local cache and post per the artifact creation guide.
      Update the issue body: append an `### E2E Testing` section and add `- [ ] e2e`
      to the Status checklist.

  done:
    prompt: |
      ## Done — Finalize Spec Issue

      Finalize the issue by adding the label, completing the status checklist, and posting a summary.

      Steps:
      1. Add the `spec-ready` label to the issue:
         ```bash
         gh issue edit {n} --repo {repo} --add-label spec-ready
         ```
         If the label does not exist on the repo yet, create it first:
         ```bash
         gh label create spec-ready --repo {repo} --description "Spec is complete and ready for implementation" --color 0E8A16
         ```
         If creation fails because it already exists, that is fine — proceed.

      2. Update the issue body status checklist: check off ALL remaining items including "spec-ready".

      3. Compile a list of all artifact comments from the ID tracking file:
         ```bash
         IDS_FILE="$HOME/.freeflow/runs/{run_id}/artifact_comment_ids.json"
         cat "$IDS_FILE"
         ```
         For each artifact, include its filename and a link to the comment (using the issue
         comment URL format: `https://github.com/{owner}/{repo}/issues/{n}#issuecomment-{comment_id}`).

      4. Update the issue body to append a summary section after the Status section:
         ```markdown
         ## Summary

         ### Design
         {2-3 sentence high-level description of the architecture from design.md}

         ### E2E Testing
         {If e2e.md was generated: describe how to run e2e tests (`fflow verify e2e.md`),
         what scenarios are covered, and note that e2e has not been executed yet —
         it runs during spec-to-code.
         If no e2e: state that e2e testing was not included in this spec.}
         ```

      5. Post a summary comment with an artifacts table and next steps.

      6. Report completion to the user: display the issue URL and confirm the spec is ready.

      The issue is left **open** — it serves as the living spec for implementation.
      This is the terminal state. The workflow ends here.
    transitions: {}
