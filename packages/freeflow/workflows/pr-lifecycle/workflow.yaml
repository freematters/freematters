# Flow:
#
#   create-pr → poll ←-----------+
#                / | \  \         |
#          rebase fix address done
#             |    |     |
#            push push  push
#             |    |     |
#             +----+-----+-------+
#

version: 1
guide: |
  Monitor a GitHub PR until it is merged or closed.
  Automatically fix CI failures, rebase when needed, and address bot review blockers
  and `@bot` mentions.

  ## Workflow directory

  `WF_DIR = ~/.freefsm/runs/<run_id>/`

  This is the workflow's working directory. The poll script writes `pr_status.json` here,
  and other states read it for PR status, CI results, bot reviews, and `@bot` mentions.

  ## Interaction model

  All user-initiated interaction goes through `@bot` mentions in inline review threads
  or PR-level comments. All @bot mentions exit poll to the `address` state for handling.

  All pr-lifecycle replies MUST be prefixed with `[from bot]` to distinguish agent-generated
  comments from human-authored ones.

  ## Thread resolution

  After fixing issues, the `push` state replies with `[from bot]` and resolves the thread
  via `resolveReviewThread`. Both pr-lifecycle and the code-review pipeline can resolve
  threads — whichever gets there first.

  ## GitHub CLI tips (avoid common pitfalls)

  - **Prefer `gh pr` / `gh run` high-level commands** over raw `gh api` calls when possible.
  - **GraphQL queries**: Always inline owner/repo/PR values directly into the query string.
    Do NOT use `-f owner=... -f repo=...` variable binding — shell escaping breaks it.
    Example: `query { repository(owner: "myorg", name: "myrepo") { ... } }`
  - **jq and `@bot`**: When searching for `@bot` in API output, pipe through `grep '@bot'`
    rather than embedding in jq expressions to avoid shell escaping issues.
  - **Check runs**: Use `gh pr checks <N>` instead of raw `/commits/{sha}/check-runs` API.

initial: create-pr

states:
  create-pr:
    prompt: |
      Verify authentication: run `gh auth status`. If not logged in, prompt user to run `gh auth login`.

      Once authenticated:
      - Run lint/format checks (refer to project CLAUDE.md for check commands). Fix any failures first.
      - Commit all local changes.
      - Check if the current branch already has an open PR:
        `gh pr list --head <branch> --json number,url`
        If one exists, push the branch, record the URL and number, and check if the description needs updating.
      - If none exists, create a new PR:
        - Target branch: Use user-specified branch if provided, otherwise use the repo's default branch.
        - Compare against target branch and summarize changes as the description.
        - Use conventional commit format for the title.
        - Check for `./specs/*/source-issue` — if it exists, read the issue reference
          (e.g., `owner/repo#42`) and add `Closes #N` or `Resolves owner/repo#N` to the
          PR description to link the PR to the source issue.
        - Create via `gh pr create`

      Record the PR URL and number — subsequent states will need them.
    transitions:
      PR ready: poll

  poll:
    prompt: |
      Run the bundled polling script as a **background bash job** so the conversation is not blocked.

      The script is at `poll_pr.py` in the same directory as this workflow YAML. Find it via:
      ```bash
      SCRIPT_DIR="$(dirname "$(readlink -f "$(fflow current --run-id <run_id> -j | jq -r '.data.fsm_path')")")"
      ```

      ## Running the script

      ```bash
      python3 "$SCRIPT_DIR/poll_pr.py" <owner> <repo> <pr_number> \
        --target <target_branch> --interval 20 --wf-dir "$WF_DIR"
      ```

      The script writes `pr_status.json` to `WF_DIR` on every cycle with the latest PR state,
      CI results, bot review threads, and `@bot` mentions. Other states read this file directly.

      ## What the script monitors (every cycle)

      - **PR state**: merged or closed → exits
      - **Target branch**: new commits ahead of HEAD → exits with `needs rebase`
      - **CI status**: all checks finished with failures → exits with `needs fix`
      - **Bot reviews / @bot mentions**: blocker-severity reviews or unhandled @bot → exits with `needs address`

      ## `@bot` dedup rules (implemented in the script)

      - **Inline threads**: a `@bot` mention is handled if a subsequent note starts with `[from bot]`
      - **Issue comments**: a `@bot` mention is handled if it has a 🚀 (rocket) reaction

      ## Exit RESULT lines

      The script prints one of these and exits:
      - `RESULT: PR merged` / `RESULT: PR closed` → transition to done
      - `RESULT: needs rebase` → transition to rebase
      - `RESULT: needs fix` → transition to fix
      - `RESULT: needs address` → transition to address (script prints @bot context)

      When running the script in the background, do NOT redirect stdout/stderr to a file —
      let output go to the terminal so the user can observe progress in real time.
      When the job completes, read its output from the task output and transition based on the RESULT line.
    transitions:
      needs fix: fix
      needs rebase: rebase
      needs address: address
      PR merged: done
      PR closed: done

  fix:
    prompt: |
      Fix CI failures.

      ## Steps

      1. Read `WF_DIR/pr_status.json` — check `ci.checks` for failed checks.
      2. Read the failed job logs to understand the failures:
         ```bash
         gh run view <run_id> --log-failed
         ```
      3. Fix the code to resolve the CI failures.
      4. Run lint/format/unit tests locally to confirm the fix doesn't introduce new issues
         (refer to project CLAUDE.md for check commands).

      If upon inspection there is nothing to fix (e.g., flaky test that passed on re-read),
      transition back to polling.
    todos:
      - Read WF_DIR/pr_status.json for failed CI checks
      - Read failed job logs
      - Fix the code
      - Run lint/format/unit tests to verify
    transitions:
      fixed: push
      nothing to fix: poll

  rebase:
    prompt: |
      Rebase onto the latest target branch.

      ## Pre-check: verify PR is still open

      The target branch may have been updated because THIS PR was just merged.
      Before rebasing, wait 2 seconds and then check if the PR was already merged:
      ```bash
      sleep 2
      gh pr view <pr_number> --json state --jq '.state'
      ```
      If the state is `MERGED` or `CLOSED`, skip the rebase and transition to `PR merged`.

      ## Steps

      1. Fetch the latest target branch:
         ```bash
         git fetch origin <target_branch>
         ```
      2. Rebase onto the target:
         ```bash
         git rebase origin/<target_branch>
         ```
      3. If there are conflicts, resolve them autonomously. Read the conflicting files,
         understand the intent of both changes, and merge them correctly.
      4. Run lint/format/unit tests locally to confirm the rebase doesn't break anything
         (refer to project CLAUDE.md for check commands).
    todos:
      - Check if PR was merged before rebasing
      - Fetch latest target branch
      - Rebase and resolve any conflicts
      - Run lint/format/unit tests to verify
    transitions:
      rebased: push
      PR merged: done

  address:
    prompt: |
      Address bot review blockers and/or `@bot` mentions.

      Read `WF_DIR/pr_status.json` for the current state.

      ## What to address (priority order)

      1. **`@bot` mentions** (highest priority — user requests):
         - Read the mention details from `pr_status.json` (`mentions` array)
         - For code change requests: make the requested modifications
         - For questions: prepare an answer (will be posted in push state)

      2. **Bot review blockers**:
         - Read `bot_review_threads` from `pr_status.json`
         - Fix threads with `severity: "blocker"` only
         - Skip major/minor severity — leave for the user to address

      **Scope rule**: Only act on items that match the criteria above. Do NOT fix
      bot review threads that are major/minor severity without an `@bot` mention,
      even if the suggestion looks reasonable. If a bot review thread also has an
      `@bot` mention, address the `@bot` request — not the bot review suggestion.

      **User priority rule**: If a `@bot` instruction contradicts a bot review blocker,
      follow the user's `@bot` instruction and skip that blocker. The code-review
      pipeline will re-evaluate in its next run.

      ## After fixing

      Run lint/format/unit tests locally to confirm fixes don't introduce new issues
      (refer to project CLAUDE.md for check commands).

      ## Before transitioning to push

      Run the poll script with `--once` to re-check for new `@bot` mentions:
      ```bash
      python3 "$SCRIPT_DIR/poll_pr.py" <owner> <repo> <pr_number> \
        --target <target_branch> --wf-dir "$WF_DIR" --once
      ```
      Read the updated `WF_DIR/pr_status.json` — if new mentions appeared, loop back
      and address them before proceeding to push.

      If upon inspection there is nothing to address, transition back to polling.
    todos:
      - Read WF_DIR/pr_status.json for mentions and bot review threads
      - Handle @bot mentions (code changes or prepare answers)
      - Fix blocker-severity bot review comments
      - Run lint/format/unit tests to verify
      - Re-check for new @bot mentions before transitioning
    transitions:
      addressed: push
      new mentions: address
      nothing to address: poll

  push:
    prompt: |
      Commit and push the changes.

      ## Actions

      1. **Check for local changes**: If there are no local changes (e.g., only a rebase
         with no conflicts), skip the commit step.

      2. **Commit and push** to the remote branch. Use force push (`--force-with-lease`)
         if the current state was entered from `rebase`.

      3. **Update PR description** if the implementation approach changed while addressing
         review feedback or `@bot` requests.

      4. **For bot review blockers that were fixed**: Reply in the thread explaining what
         was fixed. The reply body MUST start with `[from bot]` (e.g.,
         `[from bot] Fixed by adding null check in foo.ts:42`).
         Then resolve the thread:
         ```bash
         gh api graphql -f query='
           mutation { resolveReviewThread(input: {threadId: "<thread_id>"}) {
             thread { isResolved }
           } }
         '
         ```

      5. **For `@bot` code change requests that were fixed**: Reply in the same thread
         (inline) or as a new comment (issue-level) with body starting with `[from bot]`,
         explaining what was changed. Then resolve the thread (for inline threads).

      6. **For `@bot` questions**: Reply with body starting with `[from bot]` answering
         the question. Do NOT resolve the thread — the user may want to follow up.

      7. **React to processed `@bot` comments**: Add 🚀 (rocket) reaction as the
         dedup signal that the request has been handled.

      8. **Append a push summary to the PR description** summarizing what changed in this round.
         Read the current PR description via `gh pr view <N> --json body --jq .body`.
         Append a new section at the bottom using this format:
         ```
         ## Push round N
         - <bullet point for each change made in this round>
         ```
         Where N is the push round number (count existing `## Push round` headings in the
         description and add 1). Update the description via `gh pr edit <N> --body "..."`.
         If there are no meaningful changes (e.g., only a rebase with no conflicts), skip this step.
    todos:
      - Commit all changes (skip if no local changes)
      - Push to remote (force push if rebased)
      - Reply on addressed bot review threads with [from bot] prefix + resolve thread
      - Reply on addressed @bot inline review threads with [from bot] prefix + resolve (code changes only)
      - Reply on addressed @bot issue comments with [from bot] prefix (code changes only)
      - React to processed @bot comments with 🚀
      - Update PR description summary if implementation approach changed
      - Append push summary to PR description
    transitions:
      pushed: poll

  done:
    prompt: |
      The PR has been merged or closed. Output a final summary:
      - PR URL
      - Final status (merged or closed)
      - Total `@bot` interactions handled
      - Brief overview of main fixes applied
    transitions: {}
