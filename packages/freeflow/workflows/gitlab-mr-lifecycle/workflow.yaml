# Flow:
#
#   create-mr -> poll <-----------+
#                / | \  \         |
#          rebase fix address done
#             |    |     |
#            push push  push
#             |    |     |
#             +----+-----+-------+
#

version: 1
guide: |
  Monitor a GitLab MR until it is merged or closed.
  Automatically fix CI pipeline failures, rebase when needed, and address review blockers
  and `@bot` mentions.

  ## Workflow directory

  `WF_DIR = ~/.freeflow/runs/<run_id>/`

  This is the workflow's working directory. The poll script writes `mr_status.json` here,
  and other states read it for MR status, CI results, review discussions, and `@bot` mentions.

  ## Interaction model

  All user-initiated interaction goes through `@bot` mentions in inline review threads
  or MR-level notes. All @bot mentions exit poll to the `address` state for handling.

  All gitlab-mr-lifecycle replies MUST be prefixed with `[from bot]` to distinguish
  agent-generated notes from human-authored ones.

  ## Thread resolution

  After fixing issues, the `push` state replies with `[from bot]` and resolves the
  discussion thread via `glab api -X PUT projects/:id/merge_requests/:iid/discussions/:discussion_id -f resolved=true`.
  This is simpler than GitHub's GraphQL — a single REST PUT call.

  ## Agent memory

  Track these values across states:
  - `project_path`: GitLab project path (e.g., `group/project`)
  - `gitlab_url`: GitLab instance URL (e.g., `https://gitlab.corp.metabit-trading.com`)
  - `mr_iid`: MR iid (project-scoped)
  - `target_branch`: Target branch for the MR
  - `source_branch`: Source branch for the MR

  ## GitLab CLI convention

  **Prefer native `glab` commands** (`glab mr view/create/update`, `glab ci view`, etc.)
  — they auto-detect host and project from the git remote.

  **Use `glab api` only** when native commands can't do the job:
  award emoji, resolve discussions, discussion thread replies, rebase API, job traces.
  For `glab api`, URL-encode the project path:
  ```bash
  ENCODED_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$(git remote get-url origin | sed \"s|.*://[^/]*/||;s|\.git$||\" | sed \"s|.*:||\")', safe=''))")
  ```

  **Auth**: `GITLAB_TOKEN` env var. Verify with `glab auth status`.
  **Emoji dedup**: Use award emoji (eyes, rocket) on notes instead of GitHub reactions.
  **`@bot` search**: Pipe through `grep '@bot'` rather than embedding in jq to avoid escaping issues.

initial: create-mr

states:
  create-mr:
    prompt: |
      Verify authentication: run `glab auth status`. If not logged in, prompt user to run
      `glab auth login` or set `GITLAB_TOKEN` env var.

      Once authenticated:
      - Run lint/format checks (refer to project CLAUDE.md for check commands). Fix any failures first.
      - **Exclude spec directory**: If a `./specs/<feature>/` directory exists for this feature,
        ensure it is NOT included in the MR. Add it to `.gitignore` or `git reset HEAD specs/`
        before committing. Spec artifacts are working documents and should not ship with the MR.
      - Commit all local changes.
      - Check if the current branch already has an open MR:
        ```bash
        glab mr list --source-branch <branch>
        ```
        If one exists, push the branch, record the URL and iid, and check if the description needs updating.
      - If none exists, create a new MR:
        - Target branch: Use user-specified branch if provided, otherwise use the repo's default branch.
        - Compare against target branch and summarize changes as the description.
        - Use conventional commit format for the title.
        - Check for `./specs/*/source-issue` — if it exists, read the issue reference
          (e.g., `project#42`) and add `Closes #N` to the MR description to link
          the MR to the source issue.
        - Create:
          ```bash
          glab mr create -t "<title>" -d "<description>" \
            -s <source> -b <target> \
            --remove-source-branch --squash-before-merge --push --yes
          ```

      After the MR is created (or found), post an **MR note** with:
      1. **Implementation summary**: A concise overview of what was implemented and key design decisions.
      2. **Integration test results**: Run integration tests (if any) and include the output.
      3. **E2E test results**: If `e2e.md` exists in the spec directory (`./specs/<feature>/e2e.md`)
         or in the project, run the e2e tests and include the output.
      Format the note as:
      ```
      [from bot]
      ## Implementation Summary
      <summary>

      ## Integration Test Results
      <test output or "N/A -- no integration tests">

      ## E2E Test Results
      <test output or "N/A -- no e2e tests">
      ```

      Record the MR URL, iid, project_path, hostname, source_branch, and target_branch.
    transitions:
      MR ready: poll

  poll:
    prompt: |
      Run the bundled polling script as a **background bash job** so the conversation is not blocked.

      The script is at `poll_mr_gl.py` in the same directory as this workflow YAML. Find it via:
      ```bash
      SCRIPT_DIR="$(dirname "$(readlink -f "$(fflow current --run-id <run_id> -j | jq -r '.data.fsm_path')")")"
      ```

      ## Running the script

      ```bash
      python3 "$SCRIPT_DIR/poll_mr_gl.py" <project_path> <mr_iid> \
        --target <target_branch> --interval 20 --wf-dir "$WF_DIR" \
        --hostname <hostname>
      ```

      The script writes `mr_status.json` to `WF_DIR` on every cycle with the latest MR state,
      pipeline results, unresolved discussions, and `@bot` mentions. Other states read this file directly.

      ## What the script monitors (every cycle)

      - **MR state**: merged or closed -> exits
      - **Target branch**: new commits ahead of HEAD or `detailed_merge_status == need_rebase` -> exits with `needs rebase`
      - **Pipeline status**: pipeline finished with failure -> exits with `needs fix`
      - **Review discussions / @bot mentions**: blocker-severity unresolved threads or unhandled @bot -> exits with `needs address`

      ## `@bot` dedup rules (implemented in the script)

      - **Discussion threads**: a `@bot` mention is handled if a subsequent note starts with `[from bot]`
      - **Standalone notes**: a `@bot` mention is handled if it has a rocket award emoji

      ## Exit RESULT lines

      The script prints one of these and exits:
      - `RESULT: MR merged` / `RESULT: MR closed` -> transition to done
      - `RESULT: needs rebase` -> transition to rebase
      - `RESULT: needs fix` -> transition to fix
      - `RESULT: needs address` -> transition to address (script prints @bot context)

      When running the script in the background, do NOT redirect stdout/stderr to a file --
      let output go to the terminal so the user can observe progress in real time.
      When the job completes, read its output from the task output and transition based on the RESULT line.
    transitions:
      needs fix: fix
      needs rebase: rebase
      needs address: address
      MR merged: done
      MR closed: done

  fix:
    prompt: |
      Fix CI pipeline failures.

      ## Steps

      1. Read `WF_DIR/mr_status.json` -- check `pipeline_status` for failure.
      2. Read the failed job logs to understand the failures:
         ```bash
         # List failed jobs
         glab ci view
         ```
         Or use the API to get detailed job logs:
         ```bash
         # Get pipeline jobs
         glab api "projects/<encoded_project>/merge_requests/<mr_iid>" | jq '.head_pipeline.id'
         # Then get failed jobs
         glab api "projects/<encoded_project>/pipelines/<pipeline_id>/jobs" | jq '.[] | select(.status=="failed")'
         # Get job log
         glab api "projects/<encoded_project>/jobs/<job_id>/trace"
         ```
      3. Fix the code to resolve the CI failures.
      4. Run lint/format/unit tests locally to confirm the fix doesn't introduce new issues
         (refer to project CLAUDE.md for check commands).

      If upon inspection there is nothing to fix (e.g., flaky test that passed on re-read),
      transition back to polling.
    todos:
      - Read WF_DIR/mr_status.json for pipeline status
      - Read failed job logs via glab ci view or glab api
      - Fix the code
      - Run lint/format/unit tests to verify
    transitions:
      fixed: push
      nothing to fix: poll

  rebase:
    prompt: |
      Rebase onto the latest target branch.

      ## Pre-check: verify MR is still open

      The target branch may have been updated because THIS MR was just merged.
      Before rebasing, wait 2 seconds and then check if the MR was already merged:
      ```bash
      sleep 2
      glab mr view <mr_iid> -F json | jq -r '.state'
      ```
      If the state is `merged` or `closed`, skip the rebase and transition to `MR merged`.

      ## Steps

      1. **Try GitLab native rebase API first** (preferred -- no local git operations needed):
         ```bash
         glab api -X PUT "projects/<encoded_project>/merge_requests/<mr_iid>/rebase"
         ```
         Wait a few seconds and check if rebase succeeded:
         ```bash
         glab api "projects/<encoded_project>/merge_requests/<mr_iid>" | jq '.rebase_in_progress,.merge_error'
         ```
         If `rebase_in_progress` is false and no `merge_error`, the rebase succeeded.

      2. **Fallback to local rebase** if the API rebase fails (e.g., conflicts):
         ```bash
         git fetch origin <target_branch>
         git rebase origin/<target_branch>
         ```
         If there are conflicts, resolve them autonomously. Read the conflicting files,
         understand the intent of both changes, and merge them correctly.

      3. Run lint/format/unit tests locally to confirm the rebase doesn't break anything
         (refer to project CLAUDE.md for check commands).
    todos:
      - Check if MR was merged before rebasing
      - Try GitLab native rebase API
      - Fallback to local git rebase if API fails
      - Resolve any conflicts
      - Run lint/format/unit tests to verify
    transitions:
      rebased: push
      MR merged: done

  address:
    prompt: |
      Address review discussion blockers and/or `@bot` mentions.

      Read `WF_DIR/mr_status.json` for the current state.

      ## What to address (priority order)

      1. **`@bot` mentions** (highest priority -- user requests):
         - React with eyes award emoji on each `@bot` note immediately to acknowledge receipt:
           ```bash
           glab api -X POST "projects/<encoded_project>/merge_requests/<mr_iid>/notes/<note_id>/award_emoji" \
             -f name=eyes
           ```
         - Read the mention details from `mr_status.json` (`bot_mentions` array)
         - For code change requests: make the requested modifications
         - For questions: prepare an answer (will be posted in push state)

      2. **Review discussion blockers**:
         - Read `discussions` from `mr_status.json`
         - Fix threads with `severity: "blocker"` only
         - Skip major/minor severity -- leave for the user to address

      **Scope rule**: Only act on items that match the criteria above. Do NOT fix
      review threads that are major/minor severity without an `@bot` mention,
      even if the suggestion looks reasonable. If a review thread also has an
      `@bot` mention, address the `@bot` request -- not the review suggestion.

      **User priority rule**: If a `@bot` instruction contradicts a review blocker,
      follow the user's `@bot` instruction and skip that blocker. The code-review
      pipeline will re-evaluate in its next run.

      ## After fixing

      Run lint/format/unit tests locally to confirm fixes don't introduce new issues
      (refer to project CLAUDE.md for check commands).

      ## Before transitioning to push

      Run the poll script with `--once` to re-check for new `@bot` mentions:
      ```bash
      python3 "$SCRIPT_DIR/poll_mr_gl.py" <project_path> <mr_iid> \
        --target <target_branch> --wf-dir "$WF_DIR" --hostname <hostname> --once
      ```
      Read the updated `WF_DIR/mr_status.json` -- if new mentions appeared, loop back
      and address them before proceeding to push.

      If upon inspection there is nothing to address, transition back to polling.
    todos:
      - Read WF_DIR/mr_status.json for bot_mentions and discussions
      - React with eyes emoji on each @bot note to acknowledge receipt
      - Handle @bot mentions (code changes or prepare answers)
      - Fix blocker-severity review discussion threads
      - Run lint/format/unit tests to verify
      - Re-check for new @bot mentions before transitioning
    transitions:
      addressed: push
      new mentions: address
      nothing to address: poll

  push:
    prompt: |
      Commit and push the changes.

      ## Actions

      1. **Check for local changes**: If there are no local changes (e.g., only an API rebase
         with no conflicts), skip the commit step.

      2. **Commit and push** to the remote branch. Use force push (`--force-with-lease`)
         if the current state was entered from `rebase`.

      3. **Update MR description** if the implementation approach changed while addressing
         review feedback or `@bot` requests.

      4. **For review discussion blockers that were fixed**: Reply in the discussion thread
         explaining what was fixed. The reply body MUST start with `[from bot]` (e.g.,
         `[from bot] Fixed by adding null check in foo.ts:42`).
         Post the reply via:
         ```bash
         glab api -X POST "projects/<encoded_project>/merge_requests/<mr_iid>/discussions/<discussion_id>/notes" \
           -f body="[from bot] <explanation>"
         ```
         Then resolve the thread:
         ```bash
         glab api -X PUT "projects/<encoded_project>/merge_requests/<mr_iid>/discussions/<discussion_id>" \
           -f resolved=true
         ```

      5. **For `@bot` code change requests that were fixed**: Reply in the same discussion
         thread (for inline threads) or as a new MR note (for standalone notes) with body
         starting with `[from bot]`, explaining what was changed. Then resolve the thread
         (for discussion threads).

      6. **For `@bot` questions**: Reply with body starting with `[from bot]` answering
         the question. Do NOT resolve the thread -- the user may want to follow up.

      7. **React to processed `@bot` standalone notes**: Add rocket award emoji as the
         dedup signal that the request has been handled:
         ```bash
         glab api -X POST "projects/<encoded_project>/merge_requests/<mr_iid>/notes/<note_id>/award_emoji" \
           -f name=rocket
         ```

      8. **Append a push summary to the MR description** summarizing what changed in this round.
         Read the current description:
         ```bash
         glab mr view <mr_iid> -F json | jq -r '.description'
         ```
         Append a new section:
         ```
         ## Push round N
         - <bullet point for each change made in this round>
         ```
         Where N = count of existing `## Push round` headings + 1.
         Update: `glab mr update <mr_iid> -d "<updated_description>"`.
         If there are no meaningful changes (e.g., only an API rebase), skip this step.
    todos:
      - Commit all changes (skip if no local changes)
      - Push to remote (force push if rebased)
      - Reply on addressed review discussion threads with [from bot] prefix + resolve thread
      - Reply on addressed @bot discussion threads with [from bot] prefix + resolve (code changes only)
      - Reply on addressed @bot standalone notes with [from bot] prefix (code changes only)
      - React to processed @bot standalone notes with rocket emoji
      - Update MR description summary if implementation approach changed
      - Append push summary to MR description
    transitions:
      pushed: poll

  done:
    prompt: |
      The MR has been merged or closed. Output a final summary:
      - MR URL
      - Final status (merged or closed)
      - Total `@bot` interactions handled
      - Brief overview of main fixes applied
    transitions: {}
