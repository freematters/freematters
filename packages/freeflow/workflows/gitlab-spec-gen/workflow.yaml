# GitLab Spec-Gen — GitLab Issue-driven spec-gen workflow
#
# Reuses spec-gen's guide (process rules, Q&A cycle, research structure) and
# state definitions (requirements, research, design, plan, e2e-gen) via
# extends_guide + from:.
#
# Flow:
#
#   create-issue
#       |           \
#   requirements < - > research
#       |
#     design < - > requirements (gaps)
#       |
#      plan < - > design (revision)
#       |
#     e2e-gen
#       |
#     done
#
#   Fast forward: requirements -> design -> plan -> e2e-gen -> done (no intermediate approvals)

version: 1.1
extends_guide: ../spec-gen/workflow.yaml
guide: |
  {{base}}

  ### Artifact Output — GitLab Issue Override

  IMPORTANT: This overrides the "Artifact Output" section above.
  All artifacts are posted as GitLab issue notes AND cached locally as files.

  **Local artifact cache** (source of truth for content):
  ```
  $HOME/.freeflow/runs/{run_id}/artifacts/
    requirements.md
    research/<topic-name>.md
    design.md
    plan.md
    e2e.md
  ```

  **Note ID tracking**:
  ```
  $HOME/.freeflow/runs/{run_id}/artifact_note_ids.json
  ```
  Maps artifact filenames to their GitLab note IDs.

  Set these variables at the start of each state:
  ```bash
  ISSUE_IID="<issue_iid>"
  ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
  IDS_FILE="$HOME/.freeflow/runs/{run_id}/artifact_note_ids.json"
  mkdir -p "$ARTIFACTS"
  [ -f "$IDS_FILE" ] || echo '{}' > "$IDS_FILE"
  ```

  #### Creating an Artifact

  1. Write the full artifact content to a local cache file using the Write tool.
     The file content MUST start with `## <filename>` as the first line, followed by
     the markdown content. Example for `design.md`:
     ```
     ## design.md

     <design content here>
     ```

  2. Post the local file as an issue note and capture the note ID:
     ```bash
     NOTE_ID=$(glab api -X POST "projects/$ENCODED_PATH/issues/$ISSUE_IID/notes" \
       -F body=@"$ARTIFACTS/<filename>" | jq -r '.id')
     ```
     Note: `glab api` is used here (not `glab issue note`) because `-F body=@file`
     reads the note body from a file, which the native command doesn't support.

  3. Save the note ID to the tracking file:
     ```bash
     jq --arg k "<filename>" --argjson v "$NOTE_ID" '. + {($k): $v}' \
       "$IDS_FILE" > "$IDS_FILE.tmp" && mv "$IDS_FILE.tmp" "$IDS_FILE"
     ```

  #### Updating an Artifact (In-Place Edit)

  When an artifact needs revision (e.g., design changes after feedback):

  1. Edit the local cache file using the **Edit tool**. This sends only the diff
     through the LLM session, avoiding full content round-trips.

  2. Push the updated file to GitLab by patching the existing note in-place:
     ```bash
     NOTE_ID=$(jq -r '.["<filename>"]' "$IDS_FILE")
     glab api -X PUT "projects/$ENCODED_PATH/issues/$ISSUE_IID/notes/$NOTE_ID" \
       -F body=@"$ARTIFACTS/<filename>"
     ```

  Do NOT create new notes — always edit in place.

  #### Reading Artifacts

  Read artifacts from the local cache files instead of fetching all issue notes.
  Use the Read tool on `$ARTIFACTS/<filename>`. This avoids pulling the entire
  note history through the LLM context.

  ### Comment Polling

  Whenever you need to wait for a user reply on the issue, run the bundled polling script
  as a **background bash job** so the conversation is not blocked.

  The script is at `poll_issue_gl.py` in the same directory as this workflow YAML.
  Find it via:
  ```bash
  SCRIPT_DIR="$(dirname "$(readlink -f "$(fflow current --run-id {run_id} -j | jq -r '.data.fsm_path')")")"
  ```

  Run it:
  ```bash
  python3 "$SCRIPT_DIR/poll_issue_gl.py" {project_path} {issue_iid} {issue_creator} \
    --run-id {run_id}
  ```

  If using a self-hosted GitLab instance, add `--hostname {gitlab_hostname}`.

  The script:
  - Polls the issue's notes every second
  - When new notes arrive, fetches ALL new notes (no drops)
  - Reacts with eyes emoji to every new note
  - Filters for notes from `{issue_creator}` only
  - Prints `NEW_COMMENT: <body>` for each matching note
  - Persists the note count in `~/.freeflow/runs/{run_id}/comment_count`

  Run the script in the background. When it completes, read the output for the comment.

  ### Reply Prefix

  Every issue note you post MUST be prefixed with `[bot reply]` so users can easily
  distinguish bot replies from human comments.

  ### Creator-Only Filtering

  Only process notes where `author.username` matches the issue creator (the user who started
  the workflow). Ignore all other notes silently and continue polling.

  ### Status Checklist Updates

  The issue body (description) contains a status checklist. When completing a phase,
  re-read the current description (`glab issue view <iid> -F json | jq -r .description`),
  check off the phase, and update (`glab issue update <iid> -d "..."`).
  You MUST re-read before editing to avoid overwriting concurrent changes.

  The status checklist items are:
  - [ ] gathering requirements
  - [ ] research
  - [ ] design
  - [ ] plan

  - [ ] spec-ready

  ### Agent Memory

  You MUST remember these values across states (keep them in your conversation memory):
  - `project_path` — the full project path (e.g., `freematters/testbed`)
  - `gitlab_url` — the GitLab instance URL (e.g., `https://gitlab.corp.metabit-trading.com`)
  - `issue_iid` — the issue IID returned by the create-issue API call
  - `issue_creator` — the username of the person who created the issue

  Artifact note IDs are persisted in `$IDS_FILE` — do NOT track them in conversation memory.

  ### GitLab CLI Rules

  **Authentication**: `GITLAB_TOKEN` env var or `glab auth login`.

  **Prefer native `glab` commands** — they auto-detect the project from the git remote:
  | Operation | Command |
  |-----------|---------|
  | Create issue | `glab issue create -t "title" -d "body" --no-editor` |
  | Post note | `glab issue note <iid> -m "body"` |
  | View issue | `glab issue view <iid> -F json` |
  | Update issue | `glab issue update <iid> -d "desc" -l label -u label` |
  | Create MR | `glab mr create -t "title" -d "body" -s source -b target --remove-source-branch --squash-before-merge --push --yes` |
  | View MR | `glab mr view <iid> -F json` |
  | Update MR | `glab mr update <iid> -d "desc"` |

  **Use `glab api` only** when native commands can't do the job:
  - File-body upload: `-F body=@file` (artifact creation/update)
  - Note editing: `PUT .../notes/<id>` (no native equivalent)
  - Award emoji: `POST .../award_emoji`
  - Resolve discussions: `PUT .../discussions/<id>`
  - Label creation: `POST .../labels`

  For `glab api` calls, URL-encode the project path:
  ```bash
  PROJECT_PATH=$(git remote get-url origin | sed 's|.*://[^/]*/||;s|\.git$||' | sed 's|.*:||')
  ENCODED_PATH=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.stdin.read().strip(), safe=''))" <<< "$PROJECT_PATH")
  ```

  ### Error Handling

  - **Rate limit (429)**: Read `Retry-After` header, wait, retry.
  - **Network errors**: Retry after 5s, fail after 3 attempts.
  - **Description update conflict**: Re-read, re-apply, retry.

initial: create-issue

states:
  create-issue:
    prompt: |
      ## Create Issue

      Before anything else, verify GitLab CLI authentication:
      ```bash
      glab auth status
      ```
      If this fails, tell the user to run `glab auth login` and stop.

      Parse the user's prompt to extract:
      1. **Project path**: Auto-detect from git remote if not specified.
      2. **GitLab URL**: Auto-detect from git remote.
      3. **Idea**: The description of what they want to build.
      4. **Title**: Generate a concise issue title from the idea.

      Then:

      1. Create the issue:
         ```bash
         glab issue create -t "{title}" -d "{body}" --no-editor
         ```
         If this fails with 404/403, report the error and ask the user to check permissions.

         The issue body MUST follow this structure:
         ```markdown
         ## {title}

         {rough idea from user prompt}

         ## Status

         - [ ] gathering requirements
         - [ ] research
         - [ ] design
         - [ ] plan

         - [ ] spec-ready
         ```

      2. From the output, extract the issue URL and IID. Get the authenticated
         username via `glab api user | jq -r .username`.
         Remember `issue_iid`, `issue_creator`. Report the issue URL to the user.

      3. Post a welcome note on the issue:
         ```bash
         glab issue note $ISSUE_IID -m '[bot reply] ...'
         ```
         Content:
         ```
         [bot reply] Welcome! I'll guide you through a spec generation process on this issue.

         Where would you like to start?

         1. **Requirements clarification** (recommended) -- refine the idea through Q&A
         2. **Research first** -- investigate specific technical topics before refining requirements

         Reply with your choice (1 or 2).
         ```

      Now poll for the user's reply using the polling pattern from the guide.
      When you receive a reply from the issue creator:
      - If they choose requirements (1), transition to `start with requirements`
      - If they choose research (2), transition to `start with research`

      You MUST NOT proceed without the user's explicit choice via an issue note.
    transitions:
      start with requirements: requirements
      start with research: research

  requirements:
    from: "../spec-gen/workflow.yaml#requirements"
    prompt: |
      {{base}}

      ### GitLab Adaptation

      All interaction happens via issue notes.
      Read the issue description first to understand the rough idea (instead of rough-idea.md).
      Post each question as an issue note. Poll for replies using the polling pattern.

      You MUST ask ONE question at a time. Post a single question as an issue note,
      poll for the reply, record the Q&A pair, then ask the next question.
      Do NOT batch multiple questions into one note.

      When compiling requirements:
      1. Post the structured requirements as a `## requirements.md` artifact note.
      2. Update the issue description status checklist: check off "gathering requirements".
      3. Post transition options as an issue note:
         - "Revise requirements"
         - "Research first"
         - "Proceed to design"
         - "Fast forward" (skip to design, no intermediate approvals)
      4. Poll for the user's choice via note reply.

  research:
    from: "../spec-gen/workflow.yaml#research"
    prompt: |
      {{base}}

      ### GitLab Adaptation

      All interaction and output happens via issue notes -- do NOT write local files.
      Post research findings as `## research/<topic-name>.md` artifact notes,
      following the Research Structure from the guide.

      After completing research:
      1. Update the issue description status checklist: check off "research".
      2. Post transition options as an issue note:
         - "Back to requirements"
      3. Poll for the user's choice via note reply.
    transitions:
      back to requirements: requirements

  design:
    from: "../spec-gen/workflow.yaml#design"
    prompt: |
      {{base}}

      ### GitLab Adaptation

      Skip the "Design approaches" step (Step 1) -- proceed directly to the full design.

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT poll
      for approval. Complete the design, post it as an artifact note, update the status
      checklist, and immediately transition to plan.

      Before writing, read requirements and research from the local artifact cache:
      ```bash
      ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
      ```
      Use the Read tool on `$ARTIFACTS/requirements.md` and any files in `$ARTIFACTS/research/`.

      Write the design to the local cache and post it per the artifact creation guide.
      Ask for feedback via note (approve / request changes / requirements gaps). Poll for reply.
      Use in-place edit for revisions per the guide.

      On approval, update the issue description status checklist: check off "design".
    todos:
      - Post design as issue note (skip design approaches step)
      - Get user approval via issue note (skip in fast-forward mode)

  plan:
    from: "../spec-gen/workflow.yaml#plan"
    prompt: |
      {{base}}

      ### GitLab Adaptation

      **Fast forward mode**: If the user chose "fast forward" at requirements, do NOT poll
      for approval. Complete the plan, post it as an artifact note, update the status
      checklist and plan task list in the issue description, and immediately transition to e2e-gen.

      Read the design from the local artifact cache:
      ```bash
      ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
      ```
      Use the Read tool on `$ARTIFACTS/design.md`.

      Write the plan to the local cache and post it per the artifact creation guide.
      Also update the issue description to add the plan steps as a `## Plan` task checklist.
      Update the issue description status checklist: check off "plan".

      Ask for feedback via note (approve / request changes / design revision). Poll for reply.
      Use in-place edit for revisions per the guide. Also update the issue description plan
      checklist when revising.
    todos:
      - Post plan as issue note with plan checklist in issue description
      - Get user approval via issue note (skip in fast-forward mode)

  e2e-gen:
    from: "../spec-gen/workflow.yaml#e2e-gen"
    prompt: |
      {{base}}

      ### GitLab Adaptation

      Read `$HOME/.freeflow/runs/{run_id}/artifacts/design.md` for the design artifact.
      If generating e2e.md, write it to the local cache and post per the artifact creation guide.
      Update the issue description: append an `### E2E Testing` section and add `- [ ] e2e`
      to the Status checklist.

  done:
    prompt: |
      ## Done — Finalize Spec Issue

      Finalize the issue by adding the label, completing the status checklist, and posting a summary.

      Steps:
      1. Add the `spec-ready` label to the issue:
         ```bash
         # Create label if it doesn't exist (glab api — no native command for this)
         glab api -X POST "projects/$ENCODED_PATH/labels" \
           -f name=spec-ready -f color="#0E8A16" 2>/dev/null || true
         # Add to issue
         glab issue update $ISSUE_IID -l spec-ready
         ```

      2. Update the issue description status checklist: check off ALL remaining items including "spec-ready".

      3. Compile a list of all artifact notes from the ID tracking file:
         ```bash
         IDS_FILE="$HOME/.freeflow/runs/{run_id}/artifact_note_ids.json"
         cat "$IDS_FILE"
         ```
         For each artifact, include its filename and a link to the note (using the issue
         note URL format: `{gitlab_url}/{project_path}/-/issues/{iid}#note_{note_id}`).

      4. Update the issue description to append a summary section after the Status section:
         ```markdown
         ## Summary

         ### Design
         {2-3 sentence high-level description of the architecture from design.md}

         ### E2E Testing
         {If e2e.md was generated: describe how to run e2e tests (`fflow verify e2e.md`),
         what scenarios are covered, and note that e2e has not been executed yet --
         it runs during spec-to-code.
         If no e2e: state that e2e testing was not included in this spec.}
         ```

      5. Post a summary note with an artifacts table and next steps.

      6. Report completion to the user: display the issue URL and confirm the spec is ready.

      The issue is left **open** -- it serves as the living spec for implementation.
      This is the terminal state. The workflow ends here.
    transitions: {}
