# Issue-to-PR — end-to-end pipeline from issue to merged pull request / merge request.
#
# Platform-agnostic: supports both GitHub and GitLab. Supports --lite mode for simplified specs.
#
# Flow:
#
#   start ──→ spec (issue-to-spec)
#                  |
#               decide
#              /   |   \
#        auto  ff   stop
#          |    |      |
#          |  confirm  done
#          |  -implement
#          |    |
#          implement (spec-to-code)
#               |
#           confirm-pr
#          (auto skips)
#             /    \
#        submit-pr  done
#      (pr-lifecycle)
#             |
#           done

version: 1.2
extends_guide: ../issue-to-spec/workflow.yaml
guide: |
  {{base}}

  ### Issue-to-PR — Composition Guide

  This workflow composes `issue-to-spec`, `spec-to-code`, and `pr-lifecycle` into a
  single end-to-end pipeline driven entirely through an issue (GitHub or GitLab).

  #### Input

  The user provides a **full issue URL** to an existing issue (GitHub or GitLab), optionally with `--lite`.
  Pass that URL through to `issue-to-spec`; do not expect `owner/repo#N`, project paths, or free-form ideas here.

  #### Execution Modes

  After the spec is complete, the user chooses an execution mode:
  - **Full auto**: All gates are skipped. `spec-to-code` runs in fast-forward mode
    (no intermediate approvals at setup). `confirm-pr` transitions directly to `submit-pr`.
  - **Fast forward**: Gates pause for confirmation. The agent polls the issue for the
    user's go-ahead before implementation and before PR/MR submission.
  - **Stop here**: The workflow ends after the spec is generated.

  #### Lite Mode

  This workflow supports `--lite` mode, which produces simplified spec artifacts.
  Lite mode is detected from:
  - The user's arguments (e.g., `--lite` flag)
  - A parent workflow propagating the flag

  When lite mode is active, it is propagated to the `issue-to-spec` sub-workflow, which
  produces simplified design (4 sections) and plan (1 step) artifacts.

  #### Fast-Forward Propagation

  When the user chose **fast-forward** mode:
  - `issue-to-spec` runs in fast-forward mode (user chose "fast forward" at requirements)
  - Gate states (`confirm-implement`, `confirm-pr`) poll the issue for confirmation at 20s intervals

  #### Full-Auto Propagation

  When the user chose **full auto** mode:
  - `issue-to-spec` runs in fast-forward mode
  - Gate states are skipped entirely (no polling)
  - In `spec-to-code`'s setup state, select "fast forward" when prompted
  - `confirm-pr` transitions directly to `submit-pr` without asking

initial: start

states:
  start:
    prompt: |
      
      ## Issue URL and lite mode

      The user must supply a **full issue URL** (GitHub or GitLab) to an existing issue.

      ### Lite mode

      Check if the user specified `--lite` or if a parent workflow propagated the lite flag.
      Remember `lite = true` or `lite = false`.

      Pass the issue URL (and lite flag) to the `spec` sub-workflow.

      Transition to `proceed`.
    transitions:
      proceed: spec

  spec:
    workflow: ../issue-to-spec/workflow.yaml
    transitions:
      completed: decide

  decide:
    prompt: |
      ## Choose Execution Mode

      The spec is complete. Read the spec artifacts from the local cache to get an overview:
      ```bash
      ARTIFACTS="$HOME/.freeflow/runs/{run_id}/artifacts"
      ```
      Read `$ARTIFACTS/requirements.md` and `$ARTIFACTS/design.md` for a brief summary.

      Post a comment/note on the issue asking the user to choose an execution mode.
      Use "PR" for GitHub, "MR" for GitLab:

      ```
      [bot reply] ## Spec Complete!

      The spec is ready. How would you like to proceed?

      1. **Full auto** -- implement the spec and submit a PR/MR without any human approvals.
         Spec-to-code runs in fast-forward mode and submission starts automatically.
      2. **Fast forward** -- proceed to implementation, but pause before starting and before
         creating the PR/MR for your confirmation.
      3. **Stop here** -- keep the spec artifacts and end the workflow.

      Reply with your choice (1, 2, or 3).
      ```

      Poll for the user's reply using the polling pattern from the guide.

      When you receive a reply from the issue creator:
      - If they choose 1 (full auto): remember `mode = "full-auto"`, transition to `full auto`
      - If they choose 2 (fast forward): remember `mode = "fast-forward"`, transition to `fast forward`
      - If they choose 3 (stop here): transition to `stop here`

      You MUST NOT proceed without the user's explicit choice via an issue comment/note.
    transitions:
      full auto: implement
      fast forward: confirm-implement
      stop here: done

  confirm-implement:
    prompt: |
      ## Confirm Implementation

      This gate is reached in fast-forward mode. Post a confirmation request on the issue:

      ```
      [bot reply] ## Ready to Implement

      The spec is complete and ready for implementation. I'll:
      - Download the spec artifacts
      - Create a feature branch
      - Implement each plan step with TDD
      - Run e2e tests and code review

      Reply **go** to start implementation, or **stop** to end the workflow here.
      ```

      Poll for the user's reply using the polling pattern from the guide (20s interval).

      When you receive a reply from the issue creator:
      - If they approve (e.g., "go", "yes", "proceed"): transition to `approved`
      - If they want to stop (e.g., "stop", "no"): transition to `stop here`
    transitions:
      approved: implement
      stop here: done

  implement:
    workflow: ../spec-to-code/workflow.yaml
    transitions:
      completed: confirm-pr

  confirm-pr:
    prompt: |
      ## Confirm PR/MR Submission

      Implementation is complete. Read `./specs/{slug}/implementation-summary.md` and present
      the key results.

      Post the implementation summary on the issue:

      ```
      [bot reply] ## Implementation Complete

      {brief summary of what was implemented}

      **Steps completed**: {N}/{N}
      **Tests**: {total tests added}, all passing
      **Branch**: `{branch_name}`
      ```

      **Full auto mode** (`mode == "full-auto"`): Transition directly to `submit pr` without
      asking the user. Do NOT poll.

      **Fast forward mode** (`mode == "fast-forward"`): Add to the comment/note
      (use "pull request" for GitHub, "merge request" for GitLab):

      ```
      Ready to create a pull/merge request. Reply **submit** to proceed, or **stop** to end here.
      ```

      Poll for the user's reply using the polling pattern from the guide.

      When you receive a reply from the issue creator:
      - If they approve (e.g., "submit", "yes", "go"): transition to `submit pr`
      - If they want to stop (e.g., "stop", "no"): transition to `stop here`
    transitions:
      submit pr: submit-pr
      stop here: done

  submit-pr:
    workflow: ../pr-lifecycle/workflow.yaml
    transitions:
      completed: done

  done:
    prompt: |
      ## Workflow Complete

      Post a final summary comment/note on the issue (use "PR" for GitHub, "MR" for GitLab):

      ```
      [bot reply] ## Workflow Complete

      **Phases completed**: {list phases: spec / spec + implementation / spec + implementation + PR/MR}
      **Artifacts**: {list key artifacts produced}
      **PR/MR**: {URL if applicable, otherwise "N/A"}
      **Mode**: {full-auto / fast-forward}
      ```

      If the workflow stopped early (e.g., after spec only), suggest running
      `/spec-to-code` with the same issue URL to continue implementation.

      Present the final summary to the user.
    transitions: {}
