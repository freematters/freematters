version: 1
guide: |
  ## Issue Severity
  - blocker: Must fix (bugs, security vulnerabilities, broken functionality)
  - major: Strongly recommend (performance issues, bad practices, architectural flaws)
  - minor: Optional improvement (naming, minor readability)

  ## Thread handling

  - Skip already-resolved threads gracefully (other workflows may resolve them)
  - Auto-resolve threads where the flagged issue is verified as fixed in the code
  - Respond to user rebuttals on bot-authored threads
  - Detect and reply to pending user notes on bot threads


initial: init
states:
  init:
    prompt: |
      # Phase: Gather Data

      Collect all data needed for the PR review.

      First, clean up any stale spec files from previous runs:
      ```bash
      rm -f /tmp/freeflow-pr-*-diff.txt /tmp/freeflow-pr-*-changed_files.txt /tmp/freeflow-pr-*-review_payload.json /tmp/freeflow-pr-*-summary.md
      ```

      ## 1. Verify authentication

      ```bash
      gh auth status
      ```

      If not authenticated, stop and ask the user to run `gh auth login`.

      ## 2. Identify the repo and PR

      ```bash
      gh repo view --json owner,name -q '"\(.owner.login)/\(.name)"'
      gh pr view --json number,baseRefName,headRefName,headRefOid,url
      ```

      Record owner, repo, PR number, base branch, head commit SHA, and URL for subsequent states.

      ## 3. Fetch linked issue spec (if any)

      Parse the PR body for a linked issue reference:
      ```bash
      gh pr view --json body -q '.body' | grep -oP '(?:Closes|Resolves|Fixes)\s+(?:[\w-]+/[\w-]+)?#(\d+)' | head -1
      ```

      If a match is found (extract the issue number):
      1. Fetch comments from the linked issue:
         ```bash
         gh api repos/{owner}/{repo}/issues/{issue_number}/comments --paginate
         ```
      2. Look for comments containing `## design.md` and `## plan.md` markers (these are spec artifacts posted by issue-bot).
      3. For each found artifact, extract the content after the `## design.md` or `## plan.md` heading and write to `/tmp/freeflow-pr-{pr_number}-design.md` and `/tmp/freeflow-pr-{pr_number}-plan.md` respectively.
      4. If the issue reference uses `owner/repo#N` format (cross-repo), use that owner/repo instead.

      If no linked issue is found, skip this step — code review proceeds without spec context.
      Record whether spec files were found (for the summary comment later).

      ## 4. Fetch diff + API data (parallel)

      Run these commands **in parallel** (all are independent):

      **a) Save the full diff and changed files list to temp files:**
      ```bash
      gh pr diff > /tmp/freeflow-pr-{pr_number}-diff.txt
      ```
      ```bash
      gh pr diff --name-only > /tmp/freeflow-pr-{pr_number}-changed_files.txt
      ```

      **b) Fetch existing review threads** via GraphQL:
      ```bash
      gh api graphql -f query='
        query($owner: String!, $repo: String!, $pr: Int!) {
          repository(owner: $owner, name: $repo) {
            pullRequest(number: $pr) {
              reviewThreads(first: 100) {
                nodes {
                  id
                  isResolved
                  comments(first: 20) {
                    nodes {
                      id
                      databaseId
                      body
                      createdAt
                      author { login __typename }
                    }
                  }
                }
              }
            }
          }
        }
      ' -f owner={owner} -f repo={repo} -F pr={pr_number}
      ```

      **c) Fetch existing summary comment:**
      ```bash
      gh api repos/{owner}/{repo}/issues/{pr_number}/comments
      ```

      For each thread, record:
      - `id` (node ID, e.g. `PRT_kwDOxxxx`) — needed for resolveReviewThread mutation
      - `isResolved` — skip resolved threads in later phases
      - `comments` — full conversation history

      Bot-authored threads: `comments.nodes[0].author.__typename == "Bot"`
      (covers `claude[bot]`, `github-actions[bot]`, and any other GitHub App).

      > Note: `first: 100` may not cover all threads on large PRs with many review rounds.
      > If the response indicates more pages exist, paginate using the `after` cursor.

      Look for a comment whose body starts with `<!-- code-review -->`. Record its `id` if found.

      ## Error handling
      - If any API call fails, skip and continue to the next step

      **Once data is collected**, transition to the next state.
    transitions:
      data ready: review

  review:
    prompt: |
      # Phase: Review Code

      ## Review philosophy
      - **Focus on problems** — find and surface real issues, not praise
      - **Stay objective** — state facts, not opinions
      - **Suggest fixes** — give clear, actionable remediation
      - **Be precise** — attach findings to specific code lines
      - **Separate outputs** — inline comments for specific line issues; summary goes in issue comment only

      **Avoid duplicate reviews**: Read all unresolved review threads fetched in init.
      Do not raise issues that are already covered by existing threads.
      Use semantic comparison — same issue phrased differently still counts as duplicate.

      ## Derive SCRIPT_DIR

      The review agent prompts reference `$SCRIPT_DIR` for agent instruction files.
      Derive it from the workflow YAML path:
      ```bash
      SCRIPT_DIR="$(dirname "$(readlink -f "$(fflow current --run-id <run_id> -j | jq -r '.data.fsm_path')")")"
      ```

      ## Concurrent subagent review

      Use the Agent tool to **launch 3 subagents concurrently** (all in a single message).

      Each subagent prompt follows this template:

      ```
      Review the code changes in PR #{pr_number}.

      Read your review instructions from: $SCRIPT_DIR/agents/{agent}.md

      Steps:
      1. Read `/tmp/freeflow-pr-{pr_number}-changed_files.txt` to get the changed files list
      2. Read `/tmp/freeflow-pr-{pr_number}-diff.txt` to get the full diff
      3. If `/tmp/freeflow-pr-{pr_number}-design.md` exists, read it for design context
      4. If `/tmp/freeflow-pr-{pr_number}-plan.md` exists, read it for implementation plan context
      5. Review against your instructions (including design-compliance if spec files exist)

      Existing unresolved review threads (do NOT raise issues already covered here):
      {EXISTING_THREADS}

      Output ONLY the JSON array as specified in your instructions.
      ```

      > The diff was pre-fetched in init and saved to temp files to avoid redundant API calls.

      Launch these 3 subagents concurrently (use model: sonnet for all):

      | Agent file | Focus |
      |------------|-------|
      | `code-quality.md` | Code quality, KISS, YAGNI |
      | `security.md` | Security vulnerabilities |
      | `performance.md` | Performance issues |

      ## Consolidate results

      Collect outputs from all 3 subagents and merge into a unified issues list.
      Deduplicate: if multiple agents flag the same issue, keep only one.

      **Once review is complete**, transition to the next state.
    transitions:
      review complete: post-and-resolve

  post-and-resolve:
    prompt: |
      # Phase: Post Comments, Respond & Resolve

      This phase handles all interactions with the PR in a single pass.
      Execute the following steps in order.

      ## 1. Respond to user replies on existing threads

      For each unresolved bot-authored review thread from init (`author.__typename == "Bot"`):
      1. **Check for user replies**: In the thread's comments, look for human replies
         (entries after the first where `author.login` is not a bot).
      2. **Skip if already responded**: If the last comment is from the bot (this code-review
         bot, `__typename == "Bot"`) and its `createdAt` is after the last human reply, skip.
      3. **Pending reply detection**: Every user note in an unresolved bot-authored thread
         should eventually have a bot note after it. If the last note in the thread is a
         user note, the thread needs a response.
      4. **Analyze intent and respond**:
         - **User disagrees** (e.g., "this is intentional"):
           Re-examine the code. If user is right → reply acknowledging, then resolve the thread.
           If still a problem → reply explaining why.
         - **User asks for clarification**: Reply with reasoning and impact.
         - **User asks for suggestion**: Reply with concrete fix and code example.

      ```bash
      gh api repos/{owner}/{repo}/pulls/{pr_number}/comments/{comment_id}/replies \
        -f body="[reply content]"
      ```

      Record response statistics for the summary.

      ## 2. Auto-resolve fixed threads

      For each unresolved bot-authored review thread (`author.__typename == "Bot"`):
      1. Read the first comment to understand what issue was flagged
      2. Read the current version of the relevant file
      3. Determine if the flagged issue has been fixed (not just "file changed" —
         verify the specific problem is resolved)
      4. If confirmed fixed, reply then resolve via GraphQL:

      ```bash
      gh api repos/{owner}/{repo}/pulls/{pr_number}/comments/{comment_id}/replies \
        -f body="Verified fixed and resolved - [short description of what was fixed]"
      ```

      ```bash
      gh api graphql -f query='
        mutation($threadId: ID!) {
          resolveReviewThread(input: {threadId: $threadId}) {
            thread { isResolved }
          }
        }
      ' -f threadId="{thread_node_id}"
      ```

      Only resolve bot-authored threads (`__typename == "Bot"`), never human-posted ones.
      Record auto-resolve count.

      ## 3. Post new inline comments

      For each **blocker** or **major** issue from the review phase, post as an inline comment.

      Before posting, do a final dedup check: compare each new finding against all
      unresolved review threads (including those just responded to in step 1).
      If an existing thread already covers the same issue semantically, skip it.

      > This is a second dedup pass (the first was in the review phase when subagents
      > received existing threads). This pass catches duplicates across agents and
      > issues that survived the first pass.

      Submit all new comments as a single review:

      ```bash
      gh api repos/{owner}/{repo}/pulls/{pr_number}/reviews \
        --input /tmp/freeflow-pr-{pr_number}-review_payload.json
      ```

      Payload:
      ```json
      {
        "commit_id": "<head commit SHA from init step 2>",
        "event": "COMMENT",
        "comments": [
          {
            "path": "path/to/file",
            "line": 42,
            "side": "RIGHT",
            "body": "**blocker**: [description]\n\n[detail and suggestion]"
          }
        ]
      }
      ```

      Rules:
      - Lead with severity: **blocker** / **major**
      - Include specific fix suggestion when possible
      - Don't repeat the same type of issue in multiple places — pick the most representative
      - If no new comments to post, skip this step

      ## 4. Update summary comment

      Build the summary using this template:

      ```markdown
      <!-- code-review -->
      # PR Code Review Summary

      ## Spec Context

      If a linked spec was found (i.e., `/tmp/freeflow-pr-{pr_number}-design.md` exists),
      write: "Linked to issue #N — design-compliance checked."

      If no linked spec was found, write: "No linked spec found — design-compliance checks skipped."

      ## Changes Overview

      [2-3 sentences describing the PR's purpose and contribution]

      ## Key Files

      - `file/path` — [why it needs attention]

      ## Review Results

      - **blocker**: X
      - **major**: X
      - **minor**: X
      - **auto-resolved**: X (previous comments where code has been fixed)
      - **replies**: Scanned X bot threads, Y had user replies, responded to Z

      ### Blocker

      - `file/path:line` — [description] (also posted as inline comment)

      ### Major

      - `file/path:line` — [description] (also posted as inline comment)

      ### Minor

      > Not posted as inline comments, listed here for reference only

      - `file/path:line` — [description]
      ```

      If a summary comment was found in init (by `<!-- code-review -->` marker), update it:
      ```bash
      gh api repos/{owner}/{repo}/issues/comments/{comment_id} \
        -X PATCH -f body="$(cat /tmp/freeflow-pr-{pr_number}-summary.md)"
      ```

      Otherwise, create a new one:
      ```bash
      gh api repos/{owner}/{repo}/issues/{pr_number}/comments \
        -f body="$(cat /tmp/freeflow-pr-{pr_number}-summary.md)"
      ```

      ## Error handling
      - If any API call fails, skip and continue to the next one
      - Record failure counts in the summary

      **Once all steps are complete**, transition to the next state.
    todos:
      - Respond to user replies on bot threads
      - Detect pending replies — ensure every user note has a subsequent bot response
      - Auto-resolve threads where issues are confirmed fixed (verify current code)
      - Post new inline comments (deduplicated against existing threads)
      - Update or create summary issue comment
    transitions:
      complete: done

  done:
    prompt: "Review complete."
    transitions: {}
