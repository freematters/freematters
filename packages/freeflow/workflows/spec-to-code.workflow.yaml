# Flow:
#
#   setup → implement (parallel via worktrees)
#               |
#            e2e-test (all steps complete)
#               |
#         pass → review (self-fixing loop)
#               |
#         user approves → checkpoint → done
#                              |
#                         re-run e2e
#
# Picks up where spec-gen left off — reads ./specs/<slug>/ artifacts and implements them.

version: 1
guide: |
  Spec-to-Code. Implements a spec into working code, one plan.md step at a time.

  Input: `./specs/<slug>/` directory (local) or `owner/repo#N` issue reference.
  design.md is the source of truth. Each step → sub-agent → commit.

  Testing: integration-first (system boundaries, real dependencies). Unit tests only
  for complex single-module logic. No mocking internal modules.

  Issue mode (`owner/repo#N`): prefix comments with `[from bot]`, push after each
  commit, update issue checklist. Remember `owner`, `repo`, `issue_number`, `branch_name`.

initial: setup

states:
  setup:
    prompt: |
      ## Setup

      Load the spec and prepare the feature branch.

      ### 1. Detect mode

      Check if the argument matches `owner/repo#N` (regex: `[\w.-]+/[\w.-]+#\d+`).
      - If yes → **issue mode**. Remember `source_mode = "issue"`, parse `owner`, `repo`, `issue_number`.
        Derive `slug` from the issue title (lowercase, strip `feat:`/`fix:` prefixes, replace non-alphanumeric with hyphens).
      - If no → **local mode**. Remember `source_mode = "local"`. The argument is the spec directory path.

      ### 2. Load spec

      **Issue mode**:

      1. Validate the issue exists and has the `spec-ready` label:
         ```bash
         gh api 'repos/{owner}/{repo}/issues/{issue_number}' --jq '.labels[].name'
         ```
         If no `spec-ready` label, warn the user and ask if they want to proceed anyway.

      2. Download spec artifacts:
         ```bash
         python3 freefsm/workflows/download_spec.py {owner} {repo} {issue_number} --slug {slug}
         ```

      3. Prepare implementation (add `doing` label, post start comment):
         ```bash
         python3 freefsm/workflows/prepare_implementation.py {owner} {repo} {issue_number} {slug}
         ```
         Returns JSON with `branch_name`. Remember `branch_name` for later states.

      **Local mode**: The argument is the spec directory path (e.g., `./specs/my-feature/`).

      If `./specs/<slug>/plan.md` or `./specs/<slug>/design.md` does not exist, inform the user and suggest
      running the spec-gen workflow first (`/freefsm:start spec-gen`) or the issue-bot workflow for issue-driven specs.

      ### 3. Prepare feature branch

      Check the current git state:
      - If on main/master: create a feature branch (e.g., `feat/<slug>`) and switch to it.
      - If on a feature branch with a clean working tree: proceed.
      - If the working tree is dirty: STOP and ask the user how to handle it
        (stash, commit, or discard).

      Remember the feature branch name — all worktrees will branch from it.

      ### 4. Present

      1. Read `./specs/<slug>/plan.md` — parse the checklist and identify all implementation steps
      2. Read `./specs/<slug>/design.md` — understand architecture, components, interfaces, and data models
      3. Optionally read `./specs/<slug>/requirements.md` and `./specs/<slug>/research/*.md` for additional context

      Present to the user:
      - Project summary (one paragraph)
      - Number of implementation steps
      - Current progress (which steps are already checked off, if any)
      - Source mode: local or issue (with issue URL if applicable)
      - Feature branch name

      Create a todo item for each uncompleted step (using the step title). Mark already-completed steps as done.

      You MUST NOT begin any implementation work in this state.
    transitions:
      ready: implement
      spec missing: done

  implement:
    prompt: |
      ## Implement Steps

      The main agent orchestrates — it analyzes dependencies, spawns sub-agents,
      and merges results. It does NOT write implementation code itself.

      ### 1. Build dependency graph

      Read `./specs/<slug>/plan.md` and collect all unchecked steps (`- [ ]`).
      If all steps are checked, transition to `all steps complete`.

      Parse the **Depends on** field of each unchecked step to build a dependency graph.
      Identify all steps whose dependencies are already satisfied (checked or "none") —
      these are immediately ready to dispatch.

      ### 2. Dispatch & schedule

      Run a scheduling loop:

      1. Dispatch all ready steps as sub-agents **in parallel**.
         Each sub-agent runs in its own **git worktree** branched from the feature branch:

         > You are implementing Step N of ./specs/<slug>/plan.md.
         > Use strict TDD (RED → GREEN → REFACTOR).
         > Read ./specs/<slug>/design.md for component interfaces and data models.
         > Before coding, explore existing code for patterns, conventions, and style.
         >
         > 1. Define the contract: inputs, expected outputs, side effects, error conditions.
         > 2. Write failing tests (RED):
         >    - Default to integration tests across system boundaries with real dependencies.
         >    - Only mock true external boundaries (network, third-party APIs).
         >    - Unit tests only for complex single-module logic.
         > 3. Write minimum implementation to pass (GREEN)
         > 4. Refactor — clean up, run linter/formatter
         > 5. Commit your work in the worktree: `feat(scope): step N - <step title>`
         > 6. Report: tests passed/failed, lint issues, any spec deviations
         >
         > Do NOT modify plan.md or progress.md — the orchestrator handles those.

      2. When any sub-agent completes, immediately:
         - Merge its worktree branch into the feature branch.
           Resolve conflicts if any — prefer the feature branch for plan.md/progress.md,
           prefer the worktree branch for implementation files.
         - Run the full test suite to verify the merge is clean.
         - Update `./specs/<slug>/plan.md` — check off the step (`- [x] Step N`).
         - Update `./specs/<slug>/progress.md` — append a summary:
           ```
           ## Step N: <title>
           - **Files changed**: <list of key files added/modified>
           - **What was built**: <1-2 sentence summary>
           - **Tests**: <number of tests added, type breakdown, all passing/failing>
           - **Notes**: <any gotchas, workarounds, or deviations from spec>
           ```
         - Commit the plan.md and progress.md updates.
         - Check the dependency graph: if this completion unblocks new steps,
           dispatch them immediately.

      3. Repeat until all steps are complete or no more steps can be dispatched.

      #### Issue mode additional steps

      If `source_mode == "issue"`, also after each step is merged:

      6. Push to remote:
         ```bash
         git push -u origin {branch_name}   # first push
         git push                            # subsequent pushes
         ```
      7. Update the issue body checklist for each completed step.
      8. Post a `[from bot]` progress comment per step:
         ```
         [from bot] Step N/M complete: <step title>
         - **Commit**: https://github.com/{owner}/{repo}/commit/{sha}
         - **Files changed**: <list of key files>
         - **Tests**: <count> added, all passing
         ```

      Then proceed to the next wave. Repeat until all steps are complete.

      ### Constraints
      - The orchestrator MUST NOT write implementation code — only manage branches,
        merge, and update plan.md/progress.md.
      - Each sub-agent runs in its own worktree branched from the feature branch.
      - You MUST NOT skip sub-agent dispatch, even for simple steps.
      - Sub-agents MUST NOT modify plan.md or progress.md.
    transitions:
      more steps remain: implement
      all steps complete: e2e-test

  e2e-test:
    prompt: |
      ## End-to-End Test

      All implementation steps are complete. Run E2E tests to verify the feature works end-to-end.

      Read `./specs/<slug>/e2e.md`. If it does not exist, skip directly to review.

      ### Run the test

      Run `/e2e-run` with the test plan at `./specs/<slug>/e2e.md` and
      `--test-dir ./specs/<slug>/e2e-out`.

      - **Pass** (exit code 0) → transition to review
      - **Fail** → run `/e2e-fix` to diagnose the failure from the
        test-dir artifacts, fix the code, and re-run. Repeat until passing.

      Update `./specs/<slug>/progress.md` with E2E result, attempt count, and notes.
    transitions:
      e2e passed: review
      no e2e plan: review

  review:
    prompt: |
      ## Code Review & Fix

      Review the full diff, fix issues, and repeat until clean.

      ### 1. Gather the diff

      ```bash
      git diff <base>...HEAD
      ```

      Where `<base>` is the commit before the first implementation step (check `./specs/<slug>/progress.md`
      for the earliest commit hash, then use its parent).

      ### 2. Review (parallel sub-agents + aggregator)

      Dispatch three review sub-agents **in parallel**, each reviewing `git diff <base>...HEAD`:

      **Sub-agent A — Spec Compliance**
      > Read ./specs/<slug>/design.md and ./specs/<slug>/progress.md.
      > Check: Does the implementation match design.md? Missing or extra functionality?
      > Flag any spec deviations.

      **Sub-agent B — Code Quality**
      > Review for: readability, duplication, YAGNI/KISS violations, idiomatic patterns.

      **Sub-agent C — Correctness & Security**
      > Review for: edge cases, bugs, injection risks, secrets handling.
      > Run the full test suite and linter.

      Each sub-agent classifies issues as:
      - 🔴 **Major** — must fix (bugs, security, spec violations)
      - 🟠 **Medium** — should fix (YAGNI/KISS, poor error handling, architectural issues)
      - 🟡 **Minor** — nice to fix but not blocking (style, naming)

      Then dispatch an **aggregator sub-agent** to combine the three reports:

      > Deduplicate overlapping findings. Resolve conflicting severities (use higher).
      > Produce a single report: verdict (PASS/FAIL), issues by severity, total counts.

      Write the merged report to `./specs/<slug>/review-round-N.md`.

      ### 3. Fix (sub-agent, if needed)

      If there are major or medium issues, dispatch a fix sub-agent:

      > Fix the issues in ./specs/<slug>/review-round-N.md.
      > Read ./specs/<slug>/design.md for intended architecture.
      >
      > You MUST fix all 🔴 Major issues.
      > You MAY fix 🟠 Medium issues if effort is low and improvement is clear.
      > Do NOT fix 🟡 Minor issues.
      >
      > For each fix: read the code, fix minimally, run tests, add tests if needed.
      > Report: what was fixed, what was skipped (with reason), test results.

      Commit the fixes: `fix: address review issues (round N)`
      If `source_mode == "issue"`, push to remote.

      Then loop back to step 2 for a fresh review. Repeat until the review verdict is PASS
      or only minor issues remain.

      ### 4. Present to user

      Present the final review report. Ask (in user's language):

      > Review complete (N rounds).
      > - 🔴 Major: N
      > - 🟠 Medium: N
      > - 🟡 Minor: N
      >
      > 1. Looks good — proceed
      > 2. I'll handle the rest manually — proceed

      Update `./specs/<slug>/progress.md` with review summary.
    transitions:
      user approves: checkpoint

  checkpoint:
    prompt: |
      ## Checkpoint

      Review has completed. Present the current status to the user:
      - Steps completed (from plan.md)
      - E2E test result (from e2e-report.md, if exists)
      - Review result (from latest review-round-N.md)
      - Any unresolved issues

      Ask the user (in user's language):

      > 1. Looks good — finalize
      > 2. Re-run E2E tests
    transitions:
      finalize: done
      re-run e2e: e2e-test

  done:
    prompt: |
      ## Implementation Complete

      All steps from plan.md have been implemented, tested, and committed.

      Write `./specs/<slug>/implementation-summary.md` with:
      1. **Overview** — one paragraph describing what was built
      2. **Steps completed** — table of all steps with status and commit hash
      3. **Test summary** — total tests written, all passing, coverage notes
      4. **E2E result** — pass/fail, attempt count, and notes (from progress.md; omit if no e2e)
      5. **Files created/modified** — list of key files with one-line descriptions
      6. **How to run** — commands to run the project and tests
      7. **Remaining work** — any manual testing, deployment, documentation, or known limitations

      Present the summary to the user.

      If the workflow was started because the spec was missing, remind the user to run
      the spec-gen workflow (`/freefsm:start spec-gen`) first.

      ### Issue mode additional steps

      If `source_mode == "issue"`, also:

      1. Ensure all commits are pushed to remote:
         ```bash
         git push
         ```

      2. Post the implementation summary as a `[from bot]` comment on the issue.
         The comment should include the full content of `./specs/<slug>/implementation-summary.md`
         prefixed with `[from bot]` and a note about the branch:
         ```
         [from bot] ## implementation-summary.md

         {full content of implementation-summary.md}

         ---
         **Branch**: `{branch_name}`
         Ready for PR — run `/pr` to create a pull request.
         ```

      3. Write `./specs/<slug>/source-issue` containing the issue reference
         (e.g., `owner/repo#42`) so that pr-lifecycle can link the PR to the issue.

      4. Update the issue body's Summary section (added by issue-bot) to reflect e2e results.
         Re-read the current issue body, then update the `### E2E Testing` subsection with
         the actual result (pass/fail, attempt count). If the section doesn't exist, add it.

      5. Remove `doing` label and add `done` label to the issue:
         ```bash
         gh issue edit {issue_number} --repo {owner}/{repo} --remove-label doing
         gh label create done --repo {owner}/{repo} --description "Implementation complete" --color 0E8A16 2>/dev/null || true
         gh issue edit {issue_number} --repo {owner}/{repo} --add-label done
         ```
    transitions: {}
