version: 1
guide: "Child with append_todos"
initial: start
states:
  start:
    from: "./base.workflow.yaml#start"
    append_todos:
      - "Appended todo 1"
      - "Appended todo 2"
  review:
    prompt: "Child review."
    transitions:
      approved: done
  done:
    prompt: "Done."
    transitions: {}
