# Flow:
#
#   setup → execute → report → done
#

version: 1
guide: |
  E2E test verifier workflow for freefsm. Drives an agent through structured
  verification of a test plan using an embedded freefsm run.

  The test plan file path and test output directory are provided in the initial prompt.
  The agent reads the test plan, starts an embedded freefsm run, interacts with it
  via wait/send_input, and generates a report.

  ## Available MCP Tools

  In addition to standard tools (Read, Write, Bash), you have:

  ### start_embedded_run
  Start an embedded freefsm run. Provide the FSM workflow path (from the test plan's
  Setup section, after "Workflow:") and optionally a user prompt.
  Returns `{ run_id, store_root }`.

  ### wait
  Wait for the next event from the embedded agent. Returns one of:
  - `{ status: "output", text }` — the embedded agent produced text output
  - `{ status: "awaiting_input", prompt, output }` — the embedded agent is requesting
    user input via `request_input`
  - `{ status: "exited", code, output }` — the embedded agent session has ended
  - `{ status: "timeout" }` — the wait timed out

  ### send_input
  Send input text to the embedded agent when it is awaiting input (after receiving an
  `awaiting_input` status from `wait`). Fails if no input request is pending.

  Rules:
  - Read the test plan file to understand what to test.
  - Execute steps exactly as described in the test plan.
  - Decide what input to provide based on the test plan's steps and goals.
  - Do NOT skip steps or invent steps not in the plan.
  - Always proceed through all states — do not stop early.

initial: setup

states:
  setup:
    prompt: |
      ## Setup

      1. Read the test plan file (path provided in the initial prompt).
      2. Understand the background, steps, and expected outcomes.
      3. Extract the workflow path from the Setup section (after "Workflow:").
      4. Start the embedded run using `start_embedded_run` with the workflow path.
      5. Verify the run started successfully.

      If the test plan or workflow path is invalid, report the error and proceed
      to the report state to write a FAIL report.
    transitions:
      setup complete: execute

  execute:
    prompt: |
      ## Execute Test Steps

      Execute each test step from the plan by interacting with the embedded agent:

      1. Call `wait()` to observe the embedded agent's behavior.
      2. When you receive `awaiting_input`, decide what input to provide based on
         the test plan steps, then call `send_input()`.
      3. Compare actual behavior against expected outcomes for each step.
      4. Judge each step as PASS or FAIL with evidence.
      5. Continue until the embedded agent exits or all steps are complete.

      After the embedded run completes, read store files (`events.jsonl`,
      `snapshot.json`) at the `store_root` to verify FSM state transitions.

      Do NOT stop on failure — observe all steps even if one fails.
    transitions:
      all steps executed: report

  report:
    prompt: |
      ## Generate Report

      Write a test-report.md file to the test output directory (provided in the
      initial prompt) with:

      - Overall verdict: PASS or FAIL
      - Per-step verdicts with evidence
      - Any unexpected observations
      - Failure details with evidence for debugging

      Then provide a final summary as your output: overall verdict, steps passed/failed.
    transitions:
      report written: done

  done:
    prompt: |
      Verification complete. Output the final summary.
    transitions: {}
