# Flow:
#
#   create-mr → wait-for-pipeline ←--+
#                |            \       |
#              check          done    |
#              /   \                  |
#           fix ← wait-for-input     |
#             |        \              |
#           push       done          |
#             |                      |
#             +----------------------+
#

version: 1
guide: |
  Monitor a MR/PR until it is merged or closed.
  Automatically fix CI failures, bot review findings, and author-marked `!fix` comments.

  Supports GitLab (MR) and GitHub (PR). Platform is auto-detected from git remote URL:
  - GitLab: Uses GitLab REST API (requires PRIVATE-TOKEN)
  - GitHub: Prefers `gh` CLI, falls back to GitHub REST API

initial: create-mr

states:
  create-mr:
    prompt: |
      First, detect the platform from git remote URL (gitlab.* → GitLab, github.com → GitHub).

      Verify authentication:
      - GitLab: Check for PRIVATE-TOKEN (environment variable or config file). If not found, prompt user to configure it.
      - GitHub: Check `gh auth status`. If not logged in, prompt user to run `gh auth login`.

      Once authenticated:
      - Run lint/format checks (refer to project CLAUDE.md for check commands). Fix any failures first.
      - Commit all local changes.
      - Check if the current branch already has an open MR/PR:
        - GitLab: Query via GitLab API
        - GitHub: Query via `gh pr list` or GitHub API
        If one exists, push the branch, record the URL and ID, and check if the description needs updating.
      - If none exists, create a new MR/PR:
        - Target branch: Use user-specified branch if provided, otherwise use the repo's default branch.
        - Compare against target branch and summarize changes as the description.
        - Use conventional commit format for the title.
        - GitLab: Create via GitLab API
        - GitHub: Create via `gh pr create` or GitHub API

      Record the MR/PR URL and ID — subsequent states will need them.
    transitions:
      MR ready: wait-for-pipeline

  wait-for-pipeline:
    prompt: |
      Run the polling script as a **background bash job** so the conversation is not blocked.

      Write a Python polling script to `/tmp/poll_pipeline.py` and run it in the background.
      The script should check every 20 seconds and print status lines. When an exit condition
      is met, it should print a clear result line (e.g., "RESULT: pipelines finished") and exit.

      The script monitors:
      - Whether the MR/PR has been merged or closed
      - Whether all CI has completed (keep waiting if pending/running):
        - GitLab: Check pipeline status via API
        - GitHub: Use the check-runs API (`/commits/{sha}/check-runs`) ONLY.
          Do NOT use the legacy commit status API (`/commits/{sha}/status`) — it returns
          "pending" when no commit statuses exist (common with GitHub Actions), causing
          false negatives. Pipelines are finished when all check runs have `status == "completed"`.
      - Whether the target branch has new commits since the current branch was last rebased/merged
        - GitLab: Compare target branch HEAD via API
        - GitHub: Compare via `git fetch` + `git rev-list --count HEAD..origin/<target>`

      If the target branch has been updated:
      - Fetch latest target branch
      - Rebase onto it and resolve any conflicts
      - Force push to the remote branch
      - Continue polling (the push will trigger a new pipeline)

      On first entry, run a single poll inline to verify the script works
      (API token/auth valid, correct IDs, etc.) before starting the background job.

      Exit conditions (print as RESULT line):
      - MR/PR merged or closed → "RESULT: MR merged" or "RESULT: MR closed"
      - All CI completed (regardless of pass/fail) → "RESULT: pipelines finished"

      After launching the background job, you may continue with other work.
      When the job completes, read its output and transition based on the RESULT line.
    transitions:
      pipelines finished: check
      MR merged: done
      MR closed: done

  check:
    prompt: |
      All CI has completed. Check for issues that need attention:

      Check items:
      - CI results: Are there any failed jobs (GitLab pipeline / GitHub Actions checks)?
      - Bot inline review comments: Fetch all unresolved review threads. Identify bot-authored
        threads (`author.__typename == "Bot"` in GraphQL, or `user.type == "Bot"` in REST).
        All unresolved bot inline comments (blocker/major) should be fixed.
      - `!fix`-marked comments: Two scenarios:
        1. A reviewer left a review comment on the diff, and the author replied with `!fix [optional description]`
        2. The author posted a `!fix [optional description]` comment directly on the MR/PR
        Do NOT handle reviewer comments without `!fix` markers.
        API endpoints to check (must check ALL of these):
        - GitLab: MR discussions API (includes inline and general comments)
        - GitHub: Both `pulls/{N}/comments` (inline review comments) AND `issues/{N}/comments` (PR-level comments)
        When filtering with jq, use `contains("!fix")` not `test()` — the `!` character requires escaping in regex.
      - Rebase: Is the current branch behind the target branch?

      Decision logic:
      - Any issues found → fix
      - No issues → wait-for-input
    todos:
      - Check pipeline for failed jobs
      - Check for unresolved bot inline review comments (blocker/major)
      - Check for !fix-marked comments
      - Check if rebase is needed
    transitions:
      issues found: fix
      all clear: wait-for-input

  wait-for-input:
    prompt: |
      CI has passed with no pending issues.

      Run the polling script as a **background bash job** so the conversation is not blocked.

      Write a Python polling script to `/tmp/poll_input.py` and run it in the background.
      The script should check every 20 seconds and print status lines. When an exit condition
      is met, it should print a clear result line and exit.

      The script monitors:
      - Whether the MR/PR has been merged or closed
      - Whether new `!fix` markers appear (author replies or comments containing `!fix`)

      Exit conditions (print as RESULT line):
      - MR/PR merged or closed → "RESULT: MR merged" or "RESULT: MR closed"
      - `!fix` found → "RESULT: fix requested"

      After launching the background job, you may continue with other work.
      When the job completes, read its output and transition based on the RESULT line.
    transitions:
      fix requested: fix
      MR merged: done
      MR closed: done

  fix:
    prompt: |
      Fix issues found during check or wait-for-input:
      - CI failure: Fetch failed job logs (GitLab API / `gh run view --log-failed`), analyze root cause, and fix the code.
      - Bot inline review comments: Read each unresolved bot-authored review thread. Understand
        the issue described, read the relevant code, and fix it. These are blocker/major issues
        posted by automated code review — treat them as actionable items that must be addressed.
      - `!fix`-marked comments: Find author-marked `!fix` comments, read the corresponding
        reviewer comment or author's description, understand the intent, and modify the code.
      - Rebase needed: Fetch the latest target branch, git rebase. Resolve conflicts autonomously.

      After fixing, run lint/format/unit tests to confirm the fix doesn't introduce new issues.

      If upon inspection there is nothing to fix, transition back to polling.
    todos:
      - Fix CI failures (if any)
      - Fix unresolved bot inline review comments (if any)
      - Handle !fix-marked comments (if any)
      - Rebase (if needed)
      - Run lint/format/unit tests to verify
    transitions:
      fixed: push
      nothing to fix: wait-for-pipeline

  push:
    prompt: |
      Commit and push the fixes:
      - Commit and push to the remote branch (force push if rebased).
      - Only resolve review threads that were actually fixed in this round (bot review findings or `!fix`-marked comments).
        Do NOT resolve unfixed threads.
        - GitLab: Resolve discussions via API
        - GitHub: Reply to review comments explaining the fix
      - Update the MR/PR description if needed, especially when addressing review feedback changed the implementation approach.
    todos:
      - Reply to and resolve addressed !fix comments (explain what was fixed)
      - Reply to and resolve bot review discussions where critical issues were fixed (explain the fix)
      - Reply to and resolve bot review discussions that had no critical issues (acknowledge review)
      - Update MR/PR description — append a summary of what was fixed in this round
      - Push to remote (force push if rebased)
    transitions:
      pushed: wait-for-pipeline

  done:
    prompt: |
      The MR/PR has been merged or closed. Output a summary:
      - MR/PR URL
      - Total number of fix rounds
      - Brief overview of main fixes applied
    transitions: {}
