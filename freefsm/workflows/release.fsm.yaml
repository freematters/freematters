version: 1
guide: |
  Release workflow for freefsm.
  Opens a release PR, merges after CI, tags and publishes.

initial: bump
states:
  bump:
    prompt: |
      # Phase: Version Bump

      ## 1. Check preconditions

      ```bash
      git status --porcelain
      git branch --show-current
      ```

      - Working tree must be clean. If dirty, stop and ask the user to commit or stash.
      - Must be on `main`. If not, stop and warn.
      - Pull latest: `git pull --ff-only`

      ## 2. Determine bump type

      Find the last release tag:
      ```bash
      git tag --list 'freefsm-v*' --sort=-version:refname | head -1
      ```

      If no tag exists, use the full commit history. Otherwise, get commits since that tag:
      ```bash
      git log <last_tag>..HEAD -- freefsm/
      ```

      Analyze the commit messages and determine the bump type:
      - **major**: any commit with `BREAKING CHANGE` or `!:` (e.g. `feat!:`)
      - **minor**: any `feat:` or `feat(...):`
      - **patch**: everything else (`fix:`, `perf:`, `chore:`, non-conventional commits)

      Use the highest applicable level. Present your analysis to the user:
      - Show the commit list
      - Show your recommended bump type and reasoning
      - Ask the user to confirm or override

      ## 3. Generate release notes

      Read the template at `freefsm/workflows/release-notes.md` (same directory as this workflow).
      Fill in the placeholders using the commit analysis from step 2:

      - `{{VERSION}}`: the new version (from step 4 below)
      - `{{ONE_LINE_SUMMARY}}`: a single-sentence summary of the release theme
      - `{{NARRATIVE}}`: 2-3 sentences on what changed and why it matters — concise and professional
      - `{{Breaking Changes}}`: list or omit section entirely if none
      - `{{Features/Fixes/Other}}`: categorize commits by conventional commit prefix
      - `{{OWNER}}/{{REPO}}`: GitHub owner/repo
      - `{{PREV_TAG}}`: the previous release tag

      Write the filled-in notes to `WF_DIR/RELEASE_NOTES.md` (the workflow run directory,
      NOT the repo). Do not commit this file. Show the draft to the user and ask if they
      want to adjust anything before proceeding.

      ## 4. Create release branch and bump

      ```bash
      cd freefsm
      npm version <patch|minor|major> --no-git-tag-version
      npx biome check --write .
      VERSION=$(node -p "require('./package.json').version")
      cd ..
      git checkout -b release/freefsm-v${VERSION}
      git add freefsm/package.json freefsm/package-lock.json
      git commit -m "release: freefsm v${VERSION}"
      git push -u origin release/freefsm-v${VERSION}
      ```

      ## 5. Open PR

      Use the release notes as the PR body:

      ```bash
      gh pr create --title "release: freefsm v${VERSION}" \
        --body-file "$WF_DIR/RELEASE_NOTES.md"
      ```

      Record the PR number and VERSION for the next state.
    transitions:
      pr opened: ci

  ci:
    prompt: |
      # Phase: Wait for CI

      Poll the PR checks until all pass:

      ```bash
      gh pr checks <pr_number> --watch
      ```

      - If all checks pass, merge the PR.
      - If a **lint** or **format** check fails, auto-fix locally and push:
        ```bash
        cd freefsm
        npx biome check --write .
        cd ..
        git add -u && git commit -m "fix: auto-fix lint" && git push
        ```
        Then re-poll.
      - If any other check fails, show the failure and stop — ask the user how to proceed.

      ```bash
      gh pr merge <pr_number> --squash --delete-branch
      ```

      Pull the merged main:
      ```bash
      git checkout main
      git pull --ff-only
      ```
    transitions:
      merged: tag

  tag:
    prompt: |
      # Phase: Tag and Push

      Read the version from package.json (source of truth):

      ```bash
      VERSION=$(node -p "require('./freefsm/package.json').version")
      git tag "freefsm-v${VERSION}"
      git push origin "freefsm-v${VERSION}"
      ```

      The tag format `freefsm-v<version>` triggers the release workflow (npm publish + GitHub Release).

    transitions:
      tag pushed: monitor

  monitor:
    prompt: |
      # Phase: Monitor Release

      ## 1. Find the release workflow run

      ```bash
      gh run list --workflow=release.yml --limit=1 --json databaseId,status,conclusion
      ```

      ## 2. Watch until completion

      ```bash
      gh run watch <run_id>
      ```

      ## 3. Verify

      Once the run completes:

      - If **success**: update the release with generated notes and show the URL.
        ```bash
        gh release edit "freefsm-v${VERSION}" --notes-file "$WF_DIR/RELEASE_NOTES.md"
        gh release view "freefsm-v${VERSION}" --json url -q '.url'
        ```
      - If **failure**: show the error.
        ```bash
        gh run view <run_id> --log-failed | tail -30
        ```
    transitions:
      release succeeded: done
      release failed: done

  done:
    prompt: "Release complete."
    transitions: {}
