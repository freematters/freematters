# Flow:
#
#   create-pr → poll ←-----------+
#                |    \     \     |
#              check  fix   done  |
#              /   \    |         |
#           fix    poll push      |
#             |          |        |
#           push         +-------+
#             |
#             +-------------------+
#

version: 1
guide: |
  Monitor a GitHub PR until it is merged or closed.
  Automatically fix CI failures and bot review blockers. Respond to `@bot` mentions
  for conversational replies or code changes.

  ## Interaction model

  All user-initiated interaction goes through `@bot` mentions in inline review threads
  or PR-level comments. The `@bot` mention can trigger either:
  - A conversational reply (answer questions, explain code) — handled in-place during poll
  - A code modification (fix a bug, apply a suggestion) — exits poll to fix state

  All pr-lifecycle replies MUST be prefixed with `[from bot]` to distinguish agent-generated
  comments from human-authored ones.

  ## GitHub CLI tips (avoid common pitfalls)

  - **Prefer `gh pr` / `gh run` high-level commands** over raw `gh api` calls when possible.
  - **GraphQL queries**: Always inline owner/repo/PR values directly into the query string.
    Do NOT use `-f owner=... -f repo=...` variable binding — shell escaping breaks it.
    Example: `query { repository(owner: "myorg", name: "myrepo") { ... } }`
  - **jq and `@bot`**: When searching for `@bot` in API output, pipe through `grep '@bot'`
    rather than embedding in jq expressions to avoid shell escaping issues.
  - **Check runs**: Use `gh pr checks <N>` instead of raw `/commits/{sha}/check-runs` API.

initial: create-pr

states:
  create-pr:
    prompt: |
      Verify authentication: run `gh auth status`. If not logged in, prompt user to run `gh auth login`.

      Once authenticated:
      - Run lint/format checks (refer to project CLAUDE.md for check commands). Fix any failures first.
      - Commit all local changes.
      - Check if the current branch already has an open PR:
        `gh pr list --head <branch> --json number,url`
        If one exists, push the branch, record the URL and number, and check if the description needs updating.
      - If none exists, create a new PR:
        - Target branch: Use user-specified branch if provided, otherwise use the repo's default branch.
        - Compare against target branch and summarize changes as the description.
        - Use conventional commit format for the title.
        - Create via `gh pr create`

      Record the PR URL and number — subsequent states will need them.
    transitions:
      PR ready: poll

  poll:
    prompt: |
      Run the bundled polling script as a **background bash job** so the conversation is not blocked.

      The script is at `poll_pr.py` in the same directory as this workflow YAML. Find it via:
      ```bash
      SCRIPT_DIR="$(dirname "$(readlink -f "$(freefsm current --run-id <run_id> -j | jq -r '.data.fsm_path')")")"
      ```

      ## Running the script

      ```bash
      python3 "$SCRIPT_DIR/poll_pr.py" <owner> <repo> <pr_number> --target <target_branch> --interval 20
      ```

      Run a single inline poll first to verify the script works (API auth, correct IDs),
      then start it as a background job.

      ## What the script monitors (every cycle)

      - **PR state**: merged or closed → exits
      - **CI status**: all checks finished (no PENDING) → exits
      - **Target branch**: new commits ahead of HEAD → exits
      - **`@bot` mentions**: scans inline threads and issue comments for unhandled mentions

      ## `@bot` dedup rules (implemented in the script)

      - **Inline threads**: a `@bot` mention is handled if a subsequent note starts with `[from bot]`
      - **Issue comments**: a `@bot` mention is handled if a subsequent comment starts with `[from bot]`

      ## `@bot` reaction signals (visual indicators, NOT dedup)

      - 👀 — added when the poll script detects and starts processing a `@bot` mention
      - ✅ — added when the `@bot` mention has been fully handled (reply posted or fix pushed)

      ## Exit RESULT lines

      The script prints one of these and exits:
      - `RESULT: PR merged` / `RESULT: PR closed` → transition to done
      - `RESULT: pipelines finished` → transition to check
      - `RESULT: bot mention code-change` → transition to fix (script prints @bot context)
      - `RESULT: bot mention conversational` → handle in-place, then restart the script

      ## Handling conversational `@bot` mentions

      When the script exits with `RESULT: bot mention conversational`, the script has printed
      the mention details (source, author, comment_id, body). You must:
      1. Read the printed context to understand what was asked
      2. Add a 👀 reaction to the original `@bot` comment (visual: "I see this"):
         `gh api repos/<owner>/<repo>/issues/comments/<id>/reactions -f content='eyes'`
      3. Reply in the same thread / as a new comment with body starting with `[from bot]`
         — the `[from bot]` reply is the dedup signal for both inline threads and issue comments
      4. Add a ✅ reaction to the original `@bot` comment (visual: "done"):
         `gh api repos/<owner>/<repo>/issues/comments/<id>/reactions -f content='+1'`
      5. Restart the polling script — conversational replies do NOT cause a state transition

      ## Handling code-change `@bot` mentions

      Code-change is ONLY triggered by **issue-level comments** containing the word `FIX`
      (case-sensitive). Inline thread @bot mentions are always conversational.

      When the script exits with `RESULT: bot mention code-change`, the script has printed
      the mention details. Transition to fix.
      Do NOT reply yet — the push state will comment after the fix is applied.

      When running the script in the background, do NOT redirect stdout/stderr to a file —
      let output go to the terminal so the user can observe progress in real time.
      When the job completes, read its output from the task output and transition based on the RESULT line.
    transitions:
      pipelines finished: check
      fix requested: fix
      PR merged: done
      PR closed: done

  check:
    prompt: |
      All CI has completed or the target branch has been updated. Check for issues that need attention.

      ## Check items

      **1. CI results**: Are there any failed GitHub Actions checks?
      Use `gh pr checks <N> --json name,state,bucket` to check.

      **2. Bot inline review comments**: Fetch all unresolved review threads via GraphQL.
        Use owner/repo/PR inlined directly (no `-f` variables).
        Filter for bot-authored threads: `comments.nodes[0].author.__typename == "Bot"`.
        Example:
        ```bash
        gh api graphql -f query='query { repository(owner: "OWNER", name: "REPO") { pullRequest(number: N) { reviewThreads(first: 100) { nodes { isResolved comments(first: 1) { nodes { author { login __typename } body } } } } } } }'
        ```

        **Severity filtering**:
        - **Blocker**: Include in fix list — auto-fix these.
        - **Major**: Do NOT include in fix list. Skip entirely — leave for the user to
          address manually or via `@bot`.

      **3. Rebase needed**: Is the current branch behind the target branch?
        Use `git rev-list --count HEAD..origin/<target>` to detect.

      ## Decision logic

      Actionable items are:
      - CI failures
      - Bot review blockers
      - Rebase needed
      Note: `@bot` requests do NOT come through check — they arrive via poll → fix directly.

      If any actionable items exist → transition to `fix` with the list of issues.
      If no actionable items → transition to `poll`.
    todos:
      - Check GitHub Actions for failed jobs
      - Check for unresolved bot inline review comments (blocker severity only, skip major)
      - Check if rebase is needed (target branch ahead)
    transitions:
      issues found: fix
      all clear: poll

  fix:
    prompt: |
      Fix issues found during check or requested via `@bot`.

      ## Fix sources in priority order (highest first)

      1. **CI failures**: Fetch failed job logs via `gh run view --log-failed`,
         analyze root cause, and fix the code.
      2. **`@bot` code change requests**: If this state was entered via a `@bot` mention
         requesting code changes (the poll state printed the `@bot` context before exiting),
         apply the requested modification.
      3. **Bot review blockers**: Read each unresolved bot-authored review thread with blocker
         severity. Understand the issue described, read the relevant code, and fix it.
         Skip major severity comments — leave for the user to address.

      **User priority rule**: If a `@bot` instruction contradicts a bot review blocker,
      follow the user's `@bot` instruction and skip that blocker. The code-review
      pipeline will re-evaluate in its next run.

      **Rebase**: If the target branch is ahead, fetch and rebase. Resolve conflicts autonomously.

      After fixing, run lint/format/unit tests to confirm the fix doesn't introduce new issues.

      If upon inspection there is nothing to fix, transition back to polling.
    todos:
      - Fix CI failures (if any)
      - Fix unresolved bot review blockers (if any)
      - Handle @bot code change requests (if any)
      - Rebase (if needed)
      - Run lint/format/unit tests to verify
    transitions:
      fixed: push
      nothing to fix: poll

  push:
    prompt: |
      Commit and push the fixes.

      ## CRITICAL RULE: NEVER resolve threads
      pr-lifecycle MUST NEVER resolve review threads. Do NOT use the GitHub GraphQL
      `resolveReviewThread` mutation or any API call that resolves threads.
      Thread resolution is exclusively the code-review pipeline's responsibility.

      ## Actions
      1. **Commit and push** to the remote branch (force push if rebased).
      2. **Comment on addressed review threads**: For each bot review thread that was fixed,
         reply in the thread explaining what was fixed. The reply body MUST start with
         `[from bot]` (e.g., `[from bot] Fixed by adding null check in foo.ts:42`).
      3. **Comment on addressed `@bot` code change threads**: For each `@bot` mention that
         requested a code change and was addressed in this fix cycle, reply in the same
         thread (inline) or as a new comment (issue-level) with body starting with `[from bot]`,
         explaining what was changed. The `[from bot]` reply is the dedup signal.
      4. **React to processed `@bot` comments**: Add ✅ (`+1`) reaction as a visual indicator
         that the request has been handled. (The 👀 reaction was already added by the poll state.)
      5. **Update the PR description** if the implementation approach changed while
         addressing review feedback or `@bot` requests.
    todos:
      - Commit all changes
      - Push to remote (force push if rebased)
      - Comment on addressed review threads with [from bot] prefix (explain what was fixed)
      - Comment on addressed @bot code change threads with [from bot] prefix (dedup signal)
      - React to processed @bot comments with ✅ (visual indicator)
      - Update PR description if implementation approach changed
      - "NEVER resolve threads — no resolveReviewThread mutations"
    transitions:
      pushed: poll

  done:
    prompt: |
      The PR has been merged or closed. Output a summary:
      - PR URL
      - Total `@bot` interactions handled
      - Brief overview of main fixes applied
    transitions: {}
