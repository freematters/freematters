version: 1
guide: |
  Interactive fiction game creation workflow. Guides an agent through
  designing, writing, and packaging a complete text-adventure game
  as a FreeFSM example.
initial: concept
states:
  concept:
    prompt: |
      ## Game Concept

      Work with the player to define the core game concept:

      1. **Genre** — horror, mystery, sci-fi, fantasy, etc.
      2. **Setting** — where and when the story takes place
      3. **Core mystery** — the central question driving the narrative
      4. **Tone** — psychological tension, action-oriented, atmospheric, etc.
      5. **Perspective** — second-person (recommended for immersion), first-person, etc.

      Propose 2-3 concept directions and let the user choose.
      Once agreed, write a one-paragraph summary to `concept.md`.
    todos:
      - Discuss genre and setting preferences
      - Identify the core mystery or conflict
      - Agree on tone and narrative perspective
      - Write concept.md
    transitions:
      concept approved: rules

  rules:
    prompt: |
      ## Game Rules

      Design the core mechanics based on the chosen concept:

      1. **Difficulty** — how punishing is the game? (instant-death, forgiving, etc.)
      2. **Stats** — what values to track (sanity, health, time, etc.)
      3. **Items & clues** — inventory and clue collection systems
      4. **Death system** — what triggers death? Types of lethal scenarios.
      5. **Save system** — checkpoints, free save, or permadeath?
      6. **Hidden mechanics** — rules the player must discover through play

      Keep core rules to 3 or fewer. Write rules to `rules.md`.
    todos:
      - Define difficulty level and death mechanics
      - Design stat tracking system
      - Plan item and clue systems
      - Document hidden mechanics
      - Write rules.md
    transitions:
      rules approved: world

  world:
    prompt: |
      ## World Building

      First, read `concept.md` and `rules.md` to stay consistent with the
      agreed concept, tone, and mechanics.

      Create the game world:

      1. **Map** — all explorable areas with connections between them
      2. **Locked areas** — which areas require keys or conditions to access
      3. **NPCs** — characters the player can encounter (allies, enemies, neutral)
      4. **Backstory** — the history that explains the current situation
      5. **Timeline** — key events that trigger at specific times or conditions

      For each area, define:
      - Available items and clues
      - Anomalous or supernatural events
      - Instant-death triggers (if applicable)
      - Correct survival behavior

      Write the complete world design to `spec.md`.
    todos:
      - Design the map with all areas
      - Create NPC profiles and behaviors
      - Write the backstory and timeline
      - Define per-area events and death triggers
      - Write spec.md
    transitions:
      world approved: puzzles

  puzzles:
    prompt: |
      ## Puzzle Design

      Read `concept.md`, `rules.md`, and `spec.md` before designing puzzles.

      Design puzzles that gate progression:

      1. **Tutorial puzzle** — teach the player how puzzles work (easy)
      2. **Key puzzles** — unlock new areas or advance the story
      3. **Clue puzzles** — require combining information from multiple sources
      4. **Final puzzle** — the climactic challenge before the ending

      For each puzzle, define:
      - Location and difficulty (1-5 stars)
      - All clue sources (spread across earlier areas)
      - Solution steps
      - Failure consequences
      - At least 2-3 foreshadowing hints planted in prior areas

      Append puzzle designs to `spec.md`.
    todos:
      - Design tutorial puzzle
      - Design progression puzzles with distributed clues
      - Design the final puzzle or ritual
      - Verify all clue chains are solvable
      - Append to spec.md
    transitions:
      puzzles approved: endings

  endings:
    prompt: |
      ## Ending Design

      Read `concept.md`, `rules.md`, and `spec.md` before designing endings.

      Create multiple endings based on player choices and stats:

      1. **True End** — requires collecting all key clues and making optimal choices
      2. **Good End** — partial success, some loose ends remain
      3. **Bad End** — failure state, triggered by death or poor choices
      4. **Hidden End** — requires finding secret content most players miss

      For each ending, write:
      - Trigger conditions (stats, clues, choices required)
      - Full narrative text (2-3 paragraphs minimum)
      - Emotional tone and resolution

      Append ending designs to `spec.md`.
    todos:
      - Write True End with trigger conditions
      - Write Good End
      - Write Bad End
      - Write Hidden End
      - Append to spec.md
    transitions:
      endings approved: writing

  writing:
    prompt: |
      ## Narrative Writing

      Read `concept.md`, `rules.md`, and `spec.md` before writing.

      Write the actual game narrative content:

      1. **Opening scene** — the first thing the player sees
      2. **Key scene descriptions** — atmospheric writing for each major area
      3. **NPC dialogue** — what characters say at each encounter
      4. **Danger warnings** — subtle hints before instant-death scenarios
      5. **Choice prompts** — how options are presented to the player

      Follow the established tone. Use sensory details (sound, smell, touch,
      temperature) to build atmosphere. Control pacing — alternate tension
      with calm moments.

      Add narrative samples to `spec.md` or create a separate `scenes.md`.
    todos:
      - Write the opening scene
      - Write key area descriptions
      - Write NPC encounter dialogue
      - Write danger warning patterns
      - Review pacing and tone consistency
    transitions:
      writing approved: package

  package:
    prompt: |
      ## Package as FreeFSM Example

      Read all design docs (`concept.md`, `rules.md`, `spec.md`) before packaging.

      Create the final game files:

      1. **`<game-name>.fsm.yaml`** — the game runtime FSM with states for
         save management, gameplay, and each ending
      2. **`spec.md`** — finalize the complete game design document
      3. **`README.md`** — brief description and how to start the game

      The FSM should follow this structure:
      ```
      check_save → playing → ending_true / ending_good / ending_bad / ending_hidden
      each ending → check_save (restart)
      ```

      State prompts should contain all GM instructions needed to run the game.
      Reference `spec.md` for detailed content the GM needs to consult.

      Test the FSM with `freefsm start <path>` to verify it loads correctly.
    todos:
      - Create the game FSM yaml
      - Finalize spec.md
      - Write README.md
      - Verify FSM loads with freefsm start
    transitions:
      package complete: done

  done:
    prompt: |
      ## Game Complete

      The game has been created and packaged. Summary:
      - Game FSM is ready to play via `freefsm start <path>`
      - spec.md contains the full game design
      - README.md has setup instructions

      The game can be found in `freefsm/games/<game-name>/`.
    transitions: {}
