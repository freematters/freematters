# Flow:
#
#   load-spec → implement ←--+
#                   |         |
#                commit + loop (next step)
#                   |
#                e2e-test (all steps complete)
#                   |  (self-fix up to 5x on failure, then flag user)
#            pass → review
#                   |
#            user approves → checkpoint → done
#                   |              |
#            user requests    re-run e2e / review
#            fixes → fix-review → review (loop)
#
# Credit: State machine inspired by ralph-orchestrator's spec-driven.yml and pdd-to-code-assist.yml prompts.
# Picks up where PDD left off — reads ./specs/<slug>/ artifacts and implements them.

version: 1
guide: |
  Spec-to-Code workflow. Implements a spec (from a local directory or a GitHub issue)
  into working, tested code through strict TDD practices.

  Input (two modes):
    - **Local mode**: A `./specs/<slug>/` directory containing at minimum design.md and plan.md
    - **Issue mode**: A GitHub issue reference `owner/repo#N` (a spec-ready issue from issue-bot)
      The load-spec state downloads artifact comments to `./specs/<slug>/` automatically.

  The argument determines the mode:
    - If it matches `owner/repo#N` (e.g., `freematters/freematters#37`) → issue mode
    - Otherwise → local mode (treated as a directory path)

  Rules that apply across ALL states:

  - TDD discipline: Write tests BEFORE implementation. RED → GREEN → REFACTOR cycle.
  - One step at a time: Implement exactly one plan.md step per cycle.
  - Spec is authoritative: design.md is the source of truth.
  - Demoable after each step: Every completed step MUST leave the system working.
  - YAGNI & KISS: Only what the spec requires, simplest solution that works.
  - Commit atomically: Each completed step gets its own git commit.
  - Sub-agents: Each step is dispatched to a sub-agent that implements AND validates.
    On Claude, the sub agent is called with the Agent tool.
    The main agent orchestrates — it selects tasks, reviews results, marks progress, and commits.
  - Progress log: `./specs/<slug>/progress.md` is an append-only log of completed steps.
    After each step is committed, append a summary. Sub-agents MUST read this file
    for context on what has been built so far.

  ### Issue Mode Rules (only when source is owner/repo#N)

  When the workflow is started with an issue reference, these additional rules apply:

  - All comments posted to the issue MUST be prefixed with `[from bot]`
  - Push to remote after every commit so commit SHAs are visitable
  - Update the issue body checklist after each step completion
  - Remember these values across states:
    - `owner` — repo owner
    - `repo` — repo name
    - `issue_number` — the issue number
    - `branch_name` — the working branch (e.g., `issue-37-freefsm-run`)
    - `source_mode` — "issue" (vs "local" for local mode)

initial: load-spec

states:
  load-spec:
    prompt: |
      ## Load Specification

      Detect input mode and load the spec.

      ### Step 0: Detect mode

      Check if the argument matches `owner/repo#N` (regex: `[\w.-]+/[\w.-]+#\d+`).
      - If yes → **issue mode**. Remember `source_mode = "issue"`, parse `owner`, `repo`, `issue_number`.
        Derive `slug` from the issue title (lowercase, strip `feat:`/`fix:` prefixes, replace non-alphanumeric with hyphens).
      - If no → **local mode**. Remember `source_mode = "local"`. The argument is the spec directory path.

      ### Issue mode: download artifacts and prepare

      1. Validate the issue exists and has the `spec-ready` label:
         ```bash
         gh api 'repos/{owner}/{repo}/issues/{issue_number}' --jq '.labels[].name'
         ```
         If no `spec-ready` label, warn the user and ask if they want to proceed anyway.

      2. Download spec artifacts:
         ```bash
         python3 freefsm/workflows/download_spec.py {owner} {repo} {issue_number} --slug {slug}
         ```

      3. Prepare implementation (create branch, add `doing` label, post start comment):
         ```bash
         python3 freefsm/workflows/prepare_implementation.py {owner} {repo} {issue_number} {slug}
         ```
         Returns JSON with `branch_name`. Remember `branch_name` for later states.

      ### Local mode: read from directory (unchanged)

      The argument is the spec directory path (e.g., `./specs/my-feature/`).

      ### Common: parse and present

      1. Read `./specs/<slug>/plan.md` — parse the checklist and identify all implementation steps
      2. Read `./specs/<slug>/design.md` — understand architecture, components, interfaces, and data models
      3. Optionally read `./specs/<slug>/requirements.md` and `./specs/<slug>/research/*.md` for additional context

      Present to the user:
      - Project summary (one paragraph)
      - Number of implementation steps
      - Current progress (which steps are already checked off, if any)
      - The first uncompleted step title
      - Source mode: local or issue (with issue URL if applicable)

      If `./specs/<slug>/plan.md` or `./specs/<slug>/design.md` does not exist, inform the user and suggest
      running the PDD workflow first (or the issue-bot workflow for issue-driven specs).

      Create a todo item for each uncompleted step (using the step title). Mark already-completed steps as done.

      You MUST NOT begin any implementation work in this state.
    transitions:
      spec loaded: implement
      spec missing: done

  implement:
    prompt: |
      ## Implement, Validate & Commit Next Step

      ### 1. Select

      Read `./specs/<slug>/plan.md`, find the first unchecked step (`- [ ]`).
      If all steps are checked, transition to done.

      Present to the user: step number, title, and objective.

      ### 2. Execute (TDD + Validate via Sub-Agent)

      Dispatch a sub-agent to implement AND validate the step:

      > Implement Step N of ./specs/<slug>/plan.md using strict TDD (RED → GREEN → REFACTOR).
      > Read ./specs/<slug>/design.md for component interfaces and data models.
      > Read the last 300 lines of ./specs/<slug>/progress.md for context on recent steps (if it exists).
      > Before coding, explore existing code for patterns, conventions, and style to follow.
      >
      > Create a todo list and work through it:
      > 1. Write failing tests (RED)
      > 2. Write minimum implementation to pass (GREEN)
      > 3. Refactor — clean up, run linter/formatter
      > 4. Run full test suite (not just new tests) — check for regressions
      > 5. Execute the step's Demo criteria from plan.md — verify expected output
      > 6. Update ./specs/<slug>/progress.md — append a summary:
      >    ## Step N: <title>
      >    - **Files changed**: <list of key files added/modified>
      >    - **What was built**: <1-2 sentence summary>
      >    - **Tests**: <number of tests added, all passing/failing>
      >    - **Notes**: <any gotchas, workarounds, or deviations from spec>
      > 7. Report: tests passed/failed, demo result, lint issues, any spec deviations
      >
      > Do NOT modify plan.md — the orchestrator handles plan.md updates.

      The sub-agent reads the spec files itself — do NOT paste their content.

      If sub-agents are not available in your runtime, do the work directly.
      Do NOT skip sub-agent dispatch just because the task seems simple.

      ### 3. Commit & Mark Complete

      The sub-agent has already tested and validated. Proceed directly to commit.

      1. Update `./specs/<slug>/plan.md` — change `- [ ] Step N` to `- [x] Step N`
      2. Stage all relevant files (new and modified, including progress.md and plan.md)
      3. Create a git commit: `feat(scope): step N - <step title>`

      Present to the user:
      - Commit message
      - Progress: "Step N/M complete"

      #### Issue mode additional steps

      If `source_mode == "issue"`, also:

      4. Push to remote:
         ```bash
         git push -u origin {branch_name}   # first push
         git push                            # subsequent pushes
         ```

      5. Update the issue body checklist — re-read the issue body, change `- [ ] Step N`
         to `- [x] Step N`, then update:
         ```bash
         gh issue edit {issue_number} --repo {owner}/{repo} --body "{updated_body}"
         ```

      6. Post a `[from bot]` progress comment on the issue:
         ```
         [from bot] Step N/M complete: <step title>
         - **Commit**: https://github.com/{owner}/{repo}/commit/{sha}
         - **Files changed**: <list of key files>
         - **Tests**: <count> added, all passing
         ```

      Then loop back to step 1 for the next unchecked step.

      ### Constraints
      - You MUST NOT write implementation before tests exist
      - You MUST reference design.md — do not invent interfaces
      - Implement ONLY the current step — no future steps
      - You MUST dispatch a sub-agent, even if the task seems simple.
        The orchestrator's job is to manage workflow state, not to write code itself.
    transitions:
      more steps remain: implement
      all steps complete: e2e-test
      max retries exceeded: done

  e2e-test:
    prompt: |
      ## End-to-End Test

      All implementation steps are complete. Run E2E tests to verify the feature works end-to-end.

      Read `./specs/<slug>/e2e.md` for the scenario, infrastructure, and how to run.
      If `e2e.md` does not exist, skip directly to review.

      If `e2e.md` exists, you MUST attempt to execute it. Do NOT skip because the setup
      looks complex or you assume infrastructure is unavailable. Check whether the required
      environment is available (e.g., run `docker info`, check for running services, verify
      dependencies). Only flag to the user if execution genuinely fails, never preemptively.

      Dispatch a sub-agent to execute the E2E scenario:

      > Read `./specs/<slug>/e2e.md` for the full test plan.
      > Follow the "How to Run" section for environment setup and commands.
      > Execute each action, compare actual vs expected output, record PASS/FAIL.
      > Write results to `./specs/<slug>/e2e-report.md`.
      > On failure: identify root cause, fix minimally, run full test suite, re-run full scenario.

      - **Pass** → transition to review
      - **Fail (attempt < 5)** → sub-agent fixes and re-runs the full scenario within this state
      - **Fail (attempt >= 5) or cannot execute after attempting** → flag to user, ask how to proceed

      Update `./specs/<slug>/progress.md` with E2E result, attempt count, and notes.
    transitions:
      e2e passed: review
      no e2e design: review
      user says skip: review

  review:
    prompt: |
      ## Code Review

      Review the full diff for quality issues.

      ### 1. Gather the diff

      ```bash
      git diff <base>...HEAD
      ```

      Where `<base>` is the commit before the first implementation step (check `./specs/<slug>/progress.md`
      for the earliest commit hash, then use its parent).

      ### 2. Dispatch review sub-agents (in parallel)

      Dispatch these sub-agents concurrently, each reviewing `git diff <base>...HEAD`:

      **Sub-agent A — Spec Compliance**
      > Read ./specs/<slug>/design.md and ./specs/<slug>/progress.md.
      > Check: Does the implementation match design.md? Any missing or extra functionality?
      > Verify acceptance criteria are met. Flag any spec deviations.

      **Sub-agent B — Code Quality**
      > Review the diff for:
      > - Readability, naming, duplication, complexity
      > - YAGNI: Any code not required by the spec? Unused functions, future-proofing abstractions?
      > - KISS: Is this the simplest solution? Unnecessary abstractions?
      > - Idiomatic: Does code match existing codebase patterns?

      **Sub-agent C — Correctness & Security**
      > Review the diff for:
      > - Edge cases, error handling, potential bugs
      > - Architecture: separation of concerns, coupling, cohesion
      > - Security: input validation, injection risks, secrets handling
      > - Run the full test suite and linter — report results

      Each sub-agent classifies issues as:
      - 🔴 **Major** — must fix before completion (bugs, security, spec violations)
      - 🟠 **Medium** — should fix, significant quality concern (YAGNI/KISS violations, poor error handling, architectural issues)
      - 🟡 **Minor** — nice to fix but not blocking (style, naming, minor duplication)

      ### 3. Dispatch merge sub-agent

      Dispatch a sub-agent to combine the three review reports:

      > Read the reports from sub-agents A, B, and C.
      > Deduplicate overlapping findings across reports.
      > Resolve any conflicting severity classifications (use the higher severity).
      > Produce a single merged review report with:
      > - Overall verdict: PASS (no major/medium) or FAIL
      > - Combined major issues (deduplicated, with source sub-agent noted)
      > - Combined medium issues
      > - Combined minor issues
      > - Total counts per severity

      Write the merged report to `./specs/<slug>/review-round-N.md`
      (where N is the current round number).

      ### 4. Evaluate

      If this is round 1 AND there are major issues → transition directly to fix-review
      (no need to ask the user).

      Otherwise, present the review report to the user with a summary of issues. Ask (in user's language):

      > Review round N complete.
      > - 🔴 Major: N
      > - 🟠 Medium: N
      > - 🟡 Minor: N
      >
      > 1. Looks good — proceed to done
      > 2. Fix more issues — run another fix/re-review cycle
      > 3. I'll handle the rest manually — proceed to done

      Update `./specs/<slug>/progress.md` with review round summary.
    transitions:
      user approves: checkpoint
      major issues in round 1: fix-review
      user requests fixes: fix-review

  fix-review:
    prompt: |
      ## Fix Review Issues

      The user requested fixes for issues found in code review.

      ### 1. Dispatch fix sub-agent

      Dispatch a sub-agent with the latest review report (`./specs/<slug>/review-round-N.md`):

      > Fix the following issues identified in code review.
      > Read ./specs/<slug>/design.md for the intended architecture and interfaces.
      > Read ./specs/<slug>/progress.md for context on what was built.
      >
      > You MUST fix all 🔴 Major issues.
      > You MAY fix 🟠 Medium issues at your discretion — fix them if the effort is low
      > and the improvement is clear, skip if the fix is risky or complex.
      > Do NOT fix 🟡 Minor issues.
      >
      > For each issue you fix:
      > 1. Read the relevant code
      > 2. Fix the issue — keep changes minimal and focused
      > 3. Run the full test suite to ensure no regressions
      > 4. If the fix requires new tests, add them
      >
      > Report: what was fixed, what medium issues were skipped (with reason), test results.

      ### 2. Summarize

      Present a fix summary to the user:
      - Issues fixed (with brief description of each fix)
      - Medium issues skipped (with reason)
      - Test results

      ### 3. Commit

      Stage and commit the fixes: `fix: address review issues (round N)`

      If `source_mode == "issue"`, push to remote after committing.

      ### 4. Re-review

      Transition back to review for a fresh review of the updated code.
    transitions:
      fixes committed: review

  checkpoint:
    prompt: |
      ## Checkpoint

      Review has completed. Present the current status to the user:
      - Steps completed (from plan.md)
      - E2E test result (from e2e-report.md, if exists)
      - Review result (from latest review-round-N.md)
      - Any unresolved issues

      Ask the user (in user's language):

      > 1. Looks good — finalize
      > 2. Re-run E2E tests
      > 3. Run another review round
    transitions:
      finalize: done
      re-run e2e: e2e-test
      re-run review: review

  done:
    prompt: |
      ## Implementation Complete

      All steps from plan.md have been implemented, tested, and committed.

      Write `./specs/<slug>/implementation-summary.md` with:
      1. **Overview** — one paragraph describing what was built
      2. **Steps completed** — table of all steps with status and commit hash
      3. **Test summary** — total tests written, all passing, coverage notes
      4. **Files created/modified** — list of key files with one-line descriptions
      5. **How to run** — commands to run the project and tests
      6. **Remaining work** — any manual testing, deployment, documentation, or known limitations

      Present the summary to the user.

      If the workflow was started because the spec was missing, remind the user to run
      the PDD workflow (`/freefsm:start pdd`) first.

      ### Issue mode additional steps

      If `source_mode == "issue"`, also:

      1. Ensure all commits are pushed to remote:
         ```bash
         git push
         ```

      2. Post the implementation summary as a `[from bot]` comment on the issue.
         The comment should include the full content of `./specs/<slug>/implementation-summary.md`
         prefixed with `[from bot]` and a note about the branch:
         ```
         [from bot] ## implementation-summary.md

         {full content of implementation-summary.md}

         ---
         **Branch**: `{branch_name}`
         Ready for PR — run `/pr` to create a pull request.
         ```

      3. Remove `doing` label and add `done` label to the issue:
         ```bash
         gh issue edit {issue_number} --repo {owner}/{repo} --remove-label doing
         gh label create done --repo {owner}/{repo} --description "Implementation complete" --color 0E8A16 2>/dev/null || true
         gh issue edit {issue_number} --repo {owner}/{repo} --add-label done
         ```
    transitions: {}
