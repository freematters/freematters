name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json

      - name: Install freefsm
        working-directory: freefsm
        run: npm ci && npm run build && npm link && echo "$(npm root -g)/.bin" >> $GITHUB_PATH

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Install freefsm plugin
        run: freefsm install claude

      - name: Run code review
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          claude -p "Use /freefsm:start code-review to run the code review workflow. Drive it to completion — do not stop between states." \
            --dangerously-skip-permissions \
            --output-format text
