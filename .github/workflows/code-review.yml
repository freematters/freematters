name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json

      - name: Install freefsm
        working-directory: freefsm
        run: npm ci && npm run build && npm link && echo "$(npm root -g)/.bin" >> $GITHUB_PATH

      - uses: anthropics/claude-code-action@v1
        timeout-minutes: 15
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            First, install the freefsm plugin:
            ```bash
            freefsm install claude
            ```

            Then use /freefsm:start code-review to run the code review workflow.
            Drive it to completion — do not stop between states.
