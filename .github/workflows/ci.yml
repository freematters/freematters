name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx biome check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run tests (full suite on main, changed packages on PRs)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm test
          else
            CHANGED=$(git diff --name-only origin/main...HEAD -- packages/)
            PACKAGES=""
            for pkg in packages/*/; do
              pkg_name=$(basename "$pkg")
              if echo "$CHANGED" | grep -q "^packages/$pkg_name/"; then
                PACKAGES="$PACKAGES -w packages/$pkg_name"
              fi
            done
            if [ -z "$PACKAGES" ]; then
              echo "No package changes detected, skipping tests"
            else
              npm run test $PACKAGES
            fi
          fi

  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash
      - run: npm ci
      - run: npm run build
      - run: npm run test:claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash
      - name: Install Codex
        run: npm install -g @openai/codex
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration
