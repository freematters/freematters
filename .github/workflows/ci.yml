name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freefsm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json
      - run: npm ci
      - run: npx biome check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freefsm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freefsm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freefsm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: freefsm/package-lock.json
      - run: npm ci
      - run: npm install -g npm@latest
      - run: npm run build
      - name: Publish if version changed
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view freefsm version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --provenance --access public
          else
            echo "Version $CURRENT already published, skipping."
          fi
